services:
  mongo-test:
    image: mongo:7
    container_name: quintetx-mongo-test
    ports:
      - "27018:27017"
    command: ["mongod", "--quiet"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
