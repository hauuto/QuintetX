{% extends "base.html" %}

{% block title %}QuintetX - Đăng nhập{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Logo Section -->
    <div class="text-center mb-10">
        <h1 class="text-6xl font-extrabold text-[#3547E5] tracking-tighter">QuintetX</h1>
    </div>

    <!-- Login Card -->
    <div class="bg-white p-8 md:p-12 rounded-2xl shadow-xl w-full max-w-md border border-gray-100" x-data="{ mssv: '', password: '', isLoading: false }">

        <!-- Header Section -->
        <div class="mb-8 text-left">
            <h2 class="text-3xl font-bold text-gray-900 relative inline-block">
                Đăng nhập
                <!-- Short blue underline accent -->
                <span class="absolute bottom-0 left-0 w-1/3 h-1.5 bg-[#3547E5] rounded-full transform translate-y-1"></span>
            </h2>
        </div>

        <!-- Form -->
        <form @submit.prevent="isLoading = true; console.log('Login attempt:', mssv); /* Backend integration later */ setTimeout(() => isLoading = false, 1000);">

            <!-- MSSV Input -->
            <div class="mb-6">
                <label class="block text-gray-700 text-xs font-bold mb-2 uppercase tracking-widest" for="mssv">
                    Mã số sinh viên
                </label>
                <!-- Input: light gray background, no border -->
                <input
                    x-model="mssv"
                    class="w-full bg-gray-100 text-gray-900 font-semibold rounded-lg py-4 px-4 leading-tight focus:outline-none focus:bg-white focus:ring-2 focus:ring-[#3547E5] transition-all duration-200"
                    id="mssv"
                    type="text"
                    required
                >
            </div>

            <!-- Password Input -->
            <div class="mb-8">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-gray-700 text-xs font-bold uppercase tracking-widest" for="password">
                        Mật khẩu
                    </label>
                </div>
                <input
                    x-model="password"
                    class="w-full bg-gray-100 text-gray-900 font-semibold rounded-lg py-4 px-4 leading-tight focus:outline-none focus:bg-white focus:ring-2 focus:ring-[#3547E5] transition-all duration-200"
                    id="password"
                    type="password"
                    required
                >
            </div>

            <!-- Submit Button -->
            <!-- Primary button: blue fill, white uppercase bold -->
            <button
                type="submit"
                class="w-full bg-[#3547E5] hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-lg uppercase tracking-widest shadow-lg hover:shadow-xl transform active:scale-95 transition duration-150 ease-in-out flex justify-center items-center"
                :disabled="isLoading"
                :class="{ 'opacity-75 cursor-not-allowed': isLoading }"
            >
                <span x-show="!isLoading">Đăng nhập</span>
                <span x-show="isLoading" class="flex items-center">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Đang xử lý...
                </span>
            </button>

            <!-- Register Link -->
            <div class="mt-6 text-center text-sm">
                <span class="text-gray-600">Bạn chưa có tài khoản?</span>
                <a href="/register" class="ml-1 text-[#3547E5] font-bold hover:underline">Đăng ký tham gia</a>
            </div>

        </form>
    </div>

    <!-- Admin Link (Optional, kept subtle) -->
    <a href="/admin/login" class="fixed bottom-4 right-4 text-xs text-gray-400 hover:text-gray-600 font-medium">Admin &rarr;</a>

</div>
{% endblock %}
