<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QuintetX{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="shortcut icon" href="/static/favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Shared Config -->
    <script src="/static/js/config.js"></script>
    <script src="/static/js/api/client.js?v=20260324a"></script>
    <script src="/static/js/api/groups.js?v=20260324a"></script>

    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Apply shared configuration to Tailwind
        if (window.tailwindConfig) {
            tailwind.config = window.tailwindConfig;
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-quintet-bg min-h-screen text-gray-900">
    {% block content %}{% endblock %}

    <!-- Toast Notification Container (example) -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
        (function () {
            function getTypeClass(type) {
                if (type === 'success') return 'bg-green-600 text-white';
                if (type === 'error') return 'bg-red-600 text-white';
                return 'bg-gray-800 text-white';
            }

            function show(message, type) {
                const container = document.getElementById('toast-container');
                if (!container || !message) return;

                const toast = document.createElement('div');
                toast.className = `min-w-[220px] max-w-sm px-4 py-3 rounded-lg shadow-lg text-sm font-semibold transform transition duration-300 ease-out opacity-0 translate-y-2 ${getTypeClass(type)}`;
                toast.textContent = message;
                container.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.classList.remove('opacity-0', 'translate-y-2');
                    toast.classList.add('opacity-100', 'translate-y-0');
                });

                setTimeout(() => {
                    toast.classList.remove('opacity-100', 'translate-y-0');
                    toast.classList.add('opacity-0', 'translate-y-2');
                    setTimeout(() => toast.remove(), 280);
                }, 2400);
            }

            window.QXToast = { show };
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
