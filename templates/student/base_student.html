{% extends "base.html" %}

{% block title %}Sinh viên - QuintetX{% endblock %}

{% block content %}
<div
    class="flex h-screen bg-[#F0F2F5]"
    x-data="{
        currentPath: window.location.pathname,
        currentUser: { full_name: 'Nguoi choi bi an', role: 'student' },
        notificationsOpen: false,
        notifications: [],
        unreadCount: 0,
        notificationsTimerId: null,
        notificationsInFlight: false,
        notificationsStopped: false,
        notificationsVisibilityListenerAdded: false,
        async loadNotifications() {
            try {
                const result = await window.QXApi.groups.getMyNotifications(false);
                this.notifications = result.data.notifications || [];
                this.unreadCount = this.notifications.filter(n => !n.is_read).length;
            } catch (error) {
                console.error('Failed to load notifications:', error);
            }
        },
        async acceptInvite(notificationId) {
            try {
                await window.QXApi.groups.acceptInvite(notificationId);
                await this.loadNotifications();
                if (window.QXToast && window.QXToast.show) {
                    window.QXToast.show('Đã chấp nhận lời mời vào nhóm.', 'success');
                }
                setTimeout(() => window.location.reload(), 500);
            } catch (error) {
                console.error('Failed to accept invite:', error);
                if (window.QXToast && window.QXToast.show) {
                    window.QXToast.show('Không thể chấp nhận lời mời.', 'error');
                }
            }
        },
        async rejectInvite(notificationId) {
            try {
                await window.QXApi.groups.rejectInvite(notificationId);
                await this.loadNotifications();
                if (window.QXToast && window.QXToast.show) {
                    window.QXToast.show('Đã từ chối lời mời.', 'success');
                }
            } catch (error) {
                console.error('Failed to reject invite:', error);
                if (window.QXToast && window.QXToast.show) {
                    window.QXToast.show('Không thể từ chối lời mời.', 'error');
                }
            }
        },
        async openNotifications() {
            try {
                await window.QXApi.groups.markAllNotificationsRead();
                this.notifications = this.notifications.map((notif) => ({ ...notif, is_read: true }));
                this.unreadCount = 0;
            } catch (error) {
                console.error('Failed to mark notifications as read:', error);
            }
        },
        isInvitePending(notif) {
            return notif.type === 'invite' && notif.status === 'pending';
        },
        notificationRowClass(notif) {
            const base = 'px-4 py-3 border-b border-gray-50 last:border-0';
            if (this.isInvitePending(notif)) {
                return `${base} ${!notif.is_read ? 'bg-blue-50' : ''}`;
            }
            return `${base} cursor-pointer hover:bg-gray-50 transition-colors ${!notif.is_read ? 'bg-blue-50' : ''}`;
        },
        async openNotification(notif) {
            try {
                if (!notif.is_read) {
                    await window.QXApi.groups.markNotificationRead(notif._id);
                }
            } catch (error) {
                // Ignore and continue navigation.
            }
            if (notif.link) {
                window.location.href = notif.link;
            }
        },
        formatRelativeTime(value) {
            if (!value) return 'Vừa xong.';
            const deltaMs = Date.now() - new Date(value).getTime();
            const minutes = Math.max(1, Math.floor(deltaMs / 60000));
            if (minutes < 60) return `${minutes} phút trước.`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} giờ trước.`;
            const days = Math.floor(hours / 24);
            return `${days} ngày trước.`;
        },
        get initials() {
            const name = (this.currentUser.full_name || '').trim();
            if (!name) return 'SV';
            return name.split(' ').map(v => v[0]).slice(0, 2).join('').toUpperCase();
        },
        get roleLabel() {
            const role = (this.currentUser.role || '').toLowerCase();
            if (role === 'admin') return 'Admin';
            if (role === 'teacher') return 'Teacher';
            return 'Student';
        },
        initProfile() {
            try {
                const raw = localStorage.getItem('qx_user');
                if (!raw) return;
                const parsed = JSON.parse(raw);
                if (parsed && parsed.full_name) {
                    this.currentUser = {
                        full_name: parsed.full_name,
                        role: parsed.role || 'student',
                    };
                }
            } catch (error) {
                // Keep default profile when localStorage is not available.
            }
        },
        startNotificationsPolling() {
            this.notificationsStopped = false;
            if (this.notificationsTimerId) {
                clearTimeout(this.notificationsTimerId);
            }

            if (!this.notificationsVisibilityListenerAdded) {
                this.notificationsVisibilityListenerAdded = true;
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        this.loadNotifications();
                    }
                }, { passive: true });
            }

            const intervalMs = 10000;
            const loop = async () => {
                if (this.notificationsStopped) return;

                if (document.hidden) {
                    this.notificationsTimerId = setTimeout(loop, intervalMs);
                    return;
                }

                if (this.notificationsInFlight) {
                    this.notificationsTimerId = setTimeout(loop, intervalMs);
                    return;
                }

                this.notificationsInFlight = true;
                try {
                    await this.loadNotifications();
                } finally {
                    this.notificationsInFlight = false;
                }

                this.notificationsTimerId = setTimeout(loop, intervalMs);
            };

            loop();
        },
        stopNotificationsPolling() {
            this.notificationsStopped = true;
            if (this.notificationsTimerId) {
                clearTimeout(this.notificationsTimerId);
                this.notificationsTimerId = null;
            }
        }
    }"
    x-init="initProfile(); startNotificationsPolling()"
>

    <!-- Sidebar -->
    <aside class="w-[240px] bg-white flex flex-col shadow-sm z-20">
        <!-- Logo -->
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <span class="text-2xl font-extrabold text-[#3547E5] tracking-tighter cursor-pointer" onclick="window.location.href='/'">QuintetX</span>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 py-6 px-3 space-y-1">
            <a href="/student/dashboard"
               class="flex items-center px-3 py-2.5 text-sm font-semibold rounded-lg transition-colors"
               :class="currentPath.includes('/dashboard') ? 'bg-blue-50 text-[#3547E5]' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Tổng quan
            </a>

            <a href="/student/team"
               class="flex items-center px-3 py-2.5 text-sm font-semibold rounded-lg transition-colors"
               :class="currentPath.includes('/team') ? 'bg-blue-50 text-[#3547E5]' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Đội của tôi
            </a>

            <a href="/student/match"
               class="flex items-center px-3 py-2.5 text-sm font-semibold rounded-lg transition-colors"
               :class="currentPath.includes('/match') ? 'bg-blue-50 text-[#3547E5]' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Trận đấu
            </a>

            <a href="/student/history"
               class="flex items-center px-3 py-2.5 text-sm font-semibold rounded-lg transition-colors"
               :class="currentPath.includes('/history') ? 'bg-blue-50 text-[#3547E5]' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Lịch sử
            </a>

            <a href="/student/instructions"
               class="flex items-center px-3 py-2.5 text-sm font-semibold rounded-lg transition-colors"
               :class="currentPath.includes('/instructions') ? 'bg-blue-50 text-[#3547E5]' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.483 9.246 5 7.5 5 5.327 5 3.402 5.692 2 6.757v11.24C3.402 16.932 5.327 16.24 7.5 16.24c1.746 0 3.332.483 4.5 1.253m0-11.24C13.168 5.483 14.754 5 16.5 5c2.173 0 4.098.692 5.5 1.757v11.24c-1.402-1.065-3.327-1.757-5.5-1.757-1.746 0-3.332.483-4.5 1.253"></path></svg>
                Hướng dẫn SDK
            </a>
        </nav>

        <!-- User Profile (Bottom Left) -->
        <div class="p-4 border-t border-gray-100">
            <div class="flex items-center">
                <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 font-bold" x-text="initials">
                </div>
                <div class="ml-3">
                    <p class="text-sm font-bold text-gray-900" x-text="currentUser.full_name"></p>
                    <p class="text-xs text-[#3547E5] font-medium" x-text="roleLabel"></p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">

        <!-- Header -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
            <!-- Page Title Placeholder (Optional) -->
            <div></div>

            <!-- Right Actions -->
            <div class="flex items-center space-x-6">
                <!-- Bell Icon -->
                <div class="relative" x-data="{ open: false }" @click.outside="open = false">
                    <button @click="open = !open; if (open) { openNotifications(); }" class="text-gray-400 hover:text-gray-600 relative focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                        <span x-show="unreadCount > 0" class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
                    </button>

                    <!-- Notification Dropdown -->
                    <div x-show="open" x-transition.opacity x-cloak class="absolute right-0 mt-2 w-96 bg-white rounded-xl shadow-lg border border-gray-100 py-2 z-50">
                        <div class="px-4 py-2 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                            <h3 class="text-xs font-bold text-gray-900 uppercase">Thông báo</h3>
                            <span x-show="unreadCount > 0" class="text-[10px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded" x-text="`${unreadCount} mới`"></span>
                        </div>
                        <div class="max-h-80 overflow-y-auto">
                            <template x-if="notifications.length === 0">
                                <div class="px-4 py-6 text-center text-gray-500 text-sm">
                                    Không có thông báo nào.
                                </div>
                            </template>
                            <template x-for="notif in notifications" :key="notif._id">
                                <div
                                    :class="notificationRowClass(notif)"
                                    :role="(!isInvitePending(notif) && notif.link) ? 'link' : null"
                                    :tabindex="(!isInvitePending(notif) && notif.link) ? 0 : null"
                                    @click="if (!isInvitePending(notif) && notif.link) { openNotification(notif) }"
                                    @keydown.enter.prevent="if (!isInvitePending(notif) && notif.link) { openNotification(notif) }"
                                >
                                    <!-- Header with sender and time -->
                                    <div class="flex justify-between items-start mb-1">
                                        <p class="text-sm font-semibold text-gray-900" x-text="notif.sender_name"></p>
                                        <p class="text-[10px] text-gray-400">
                                            <span x-text="formatRelativeTime(notif.created_at)"></span>
                                        </p>
                                    </div>
                                    <!-- Message -->
                                    <p class="text-xs text-gray-600 mb-2" x-text="notif.message"></p>
                                    <!-- Action buttons for pending invites -->
                                    <template x-if="isInvitePending(notif)">
                                        <div class="flex gap-2">
                                            <button
                                                @click.stop="acceptInvite(notif._id)"
                                                type="button"
                                                class="flex-1 text-xs font-semibold bg-green-500 text-white py-1.5 rounded hover:bg-green-600 transition-colors"
                                            >
                                                Đồng ý
                                            </button>
                                            <button
                                                @click.stop="rejectInvite(notif._id)"
                                                type="button"
                                                class="flex-1 text-xs font-semibold bg-gray-300 text-gray-700 py-1.5 rounded hover:bg-gray-400 transition-colors"
                                            >
                                                Từ chối
                                            </button>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Gear Icon -->
                <div class="relative" x-data="{ open: false }">
                    <button @click="open = !open" @click.outside="open = false" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>

                    <!-- Settings Dropdown -->
                    <div x-show="open" x-transition.opacity x-cloak class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 py-1 z-50">
                        <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-gray-900">
                            Đổi mật khẩu
                        </a>
                        <div class="h-px bg-gray-100 my-1"></div>
                        <a href="/" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 font-medium">
                            Đăng xuất
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- View Content -->
        <div class="flex-1 overflow-auto p-8">
            {% block student_content %}{% endblock %}
        </div>
    </main>
</div>
{% endblock %}
