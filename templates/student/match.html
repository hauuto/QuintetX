{% extends "student/base_student.html" %}

{% block student_content %}
<div x-data="studentMatchPage()" x-init="init()" class="h-[calc(100vh-8rem)]">
    <template x-if="loading">
        <div class="h-full flex items-center justify-center bg-white rounded-xl border border-gray-100 shadow-sm">
            <p class="text-sm font-semibold text-gray-600">Đang tải dữ liệu trận đấu...</p>
        </div>
    </template>

    <template x-if="!loading && currentMatch">
        <div class="flex h-full flex-col lg:flex-row gap-6">
            <div
                class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden relative">
                <div
                    class="h-14 bg-white border-b border-gray-100 flex items-center justify-between px-6 shrink-0 z-10">
                    <div class="flex items-center space-x-4">
                        <a :href="backUrl"
                            class="inline-flex items-center text-sm font-semibold text-gray-500 hover:text-[#3547E5] transition-colors border-r border-gray-200 pr-4 mr-2">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                            </svg>
                            Quay lại
                        </a>
                        <div class="flex items-center space-x-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"
                                :class="currentMatch && currentMatch.status === 'playing' ? 'bg-green-500' : 'bg-gray-500'"></span>
                            <span class="text-sm font-bold text-gray-900" x-text="statusLabel"></span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-sm font-mono font-medium text-gray-500"
                            x-show="currentMatch && currentMatch.status === 'playing'">
                            <span class="text-gray-900 font-bold" x-text="turnCountdownDisplay"></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase"
                                :class="modeBadgeClass"
                                x-text="modeLabel"></span>
                            <span x-show="currentMatch" class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-green-50 text-green-700" x-text="turnLabel"></span>
                            <div class="text-sm font-semibold text-gray-900" x-text="currentMatch ? currentMatch.room_name : ''"></div>
                        </div>
                    </div>
                </div>

                <div class="flex-1 overflow-auto bg-[#F0F2F5] p-4 flex items-center justify-center"
                    id="board-container">
                    <canvas x-ref="boardCanvas" x-effect="renderBoard()" class="bg-white shadow-lg border border-gray-300 mx-auto"></canvas>
                </div>

                <div x-show="isPlaybackEnabled" class="h-16 bg-white border-t border-gray-100 flex items-center px-4 space-x-2 shrink-0 z-10 select-none">
                    <button @click="togglePlay" class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-700 transition-colors focus:outline-none">
                        <template x-if="isPlaying">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </template>
                        <template x-if="!isPlaying">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </template>
                    </button>

                    <button @click="prevMove" class="w-8 h-8 rounded hover:bg-gray-100 flex items-center justify-center text-gray-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>

                    <div class="flex-1 mx-2 flex items-center">
                        <span class="text-xs font-mono text-gray-500 mr-2 w-8 text-right" x-text="currentStep"></span>
                        <input type="range" min="0" :max="totalSteps" x-model.number="currentStep" @input="seek"
                            class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[#3547E5]">
                        <span class="text-xs font-mono text-gray-500 ml-2 w-8" x-text="totalSteps"></span>
                    </div>

                    <button @click="nextMove" class="w-8 h-8 rounded hover:bg-gray-100 flex items-center justify-center text-gray-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>

                    <div class="h-6 w-px bg-gray-200 mx-2"></div>

                    <div class="relative">
                        <select x-model="speed" @change="onSpeedChange" class="appearance-none bg-gray-50 border border-gray-200 text-gray-700 text-xs font-bold py-1.5 pl-3 pr-8 rounded outline-none focus:border-[#3547E5] cursor-pointer">
                            <option value="0.5">0.5x</option>
                            <option value="1">1x</option>
                            <option value="2">2x</option>
                            <option value="4">4x</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                            <svg class="fill-current h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-80 flex flex-col gap-6 shrink-0 h-full overflow-hidden">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 shrink-0">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Các đội</h3>

                    <div class="space-y-3">
                        <div class="flex items-center justify-between p-2 rounded"
                            :class="myTeam && myTeam.side === 'X' ? 'bg-blue-50 border border-blue-100' : 'bg-white border border-gray-100'">
                            <div class="flex items-center">
                                <span
                                    class="w-6 h-6 rounded flex items-center justify-center bg-[#3547E5] text-white text-xs font-bold mr-2">X</span>
                                <div>
                                    <span class="font-bold text-gray-900 text-sm block"
                                        x-text="currentMatch.teams.X.name"></span>
                                    <div class="flex items-center gap-1.5 mt-0.5">
                                        <template x-if="currentMatch.teams.X.is_connected">
                                            <span class="text-[10px] font-bold text-green-600 uppercase">Online</span>
                                        </template>
                                        <template x-if="!currentMatch.teams.X.is_connected">
                                            <span class="text-[10px] font-bold text-gray-400 uppercase">Offline</span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between p-2 rounded"
                            :class="myTeam && myTeam.side === 'O' ? 'bg-blue-50 border border-blue-100' : 'bg-white border border-gray-100'">
                            <div class="flex items-center">
                                <span
                                    class="w-6 h-6 rounded flex items-center justify-center bg-[#E53535] text-white text-xs font-bold mr-2">O</span>
                                <div>
                                    <span class="font-bold text-gray-900 text-sm block"
                                        x-text="currentMatch.teams.O.name"></span>
                                    <div class="flex items-center gap-1.5 mt-0.5">
                                        <template x-if="currentMatch.teams.O.is_connected">
                                            <span class="text-[10px] font-bold text-green-600 uppercase">Online</span>
                                        </template>
                                        <template x-if="!currentMatch.teams.O.is_connected">
                                            <span class="text-[10px] font-bold text-gray-400 uppercase">Offline</span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden">
                    <div class="p-4 border-b border-gray-100 bg-gray-50/50">
                        <h3 class="text-xs font-bold text-gray-900 uppercase">Lịch sử nước đi</h3>
                    </div>
                    <div class="flex-1 overflow-y-auto p-0">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-50 sticky top-0">
                                <tr>
                                    <th class="px-3 py-2 text-xs font-semibold text-gray-500">#</th>
                                    <th class="px-3 py-2 text-xs font-semibold text-gray-500">Đội</th>
                                    <th class="px-3 py-2 text-xs font-semibold text-gray-500 text-right">Tọa độ</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <template x-for="(move, index) in visibleHistory" :key="move.order">
                                    <tr class="text-xs" :class="{'bg-blue-50/50': index === visibleHistory.length - 1}">
                                        <td class="px-3 py-2 text-gray-500 font-mono" x-text="move.order"></td>
                                        <td class="px-3 py-2 font-bold"
                                            :class="move.team === 'X' ? 'text-[#3547E5]' : 'text-[#E53535]'"
                                            x-text="move.team"></td>
                                        <td class="px-3 py-2 text-gray-700 font-mono text-right" x-text="move.coord">
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 h-52 flex flex-col overflow-hidden">
                    <div class="p-4 border-b border-gray-100 bg-gray-50/50 flex items-center justify-between">
                        <h3 class="text-xs font-bold text-gray-900 uppercase">Match Event Log</h3>
                        <span class="text-[10px] font-semibold text-gray-500"
                            x-text="currentMatch.events ? currentMatch.events.length : 0"></span>
                    </div>
                    <div class="flex-1 overflow-y-auto p-2 space-y-1">
                        <template x-if="!currentMatch.events || currentMatch.events.length === 0">
                            <p class="text-xs text-gray-400 px-2 py-1">Chưa có sự kiện.</p>
                        </template>
                        <template x-for="(eventItem, idx) in (currentMatch.events || []).slice().reverse()"
                            :key="`${eventItem.created_at}-${idx}`">
                            <div class="px-2 py-1.5 rounded border border-gray-100 bg-white">
                                <p class="text-[11px] font-semibold text-gray-700" x-text="eventItem.type"></p>
                                <p class="text-xs text-gray-900" x-text="eventItem.message"></p>
                                <p class="text-[10px] text-gray-400" x-text="eventItem.created_at || ''"></p>
                            </div>
                        </template>
                    </div>
                </div>

            </div>
        </div>
    </template>

    <!-- Winner Popup -->
    <template x-if="currentMatch && currentMatch.status === 'finished' && showingWinnerPopup">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm" x-transition>
            <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center border-t-4"
                :class="currentMatch.winner === myTeam?.side ? 'border-green-500' : (currentMatch.winner ? 'border-red-500' : 'border-gray-500')">
                <div class="w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4"
                    :class="currentMatch.winner === myTeam?.side ? 'bg-green-100 text-green-600' : (currentMatch.winner ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-600')">
                    <template x-if="currentMatch.winner === myTeam?.side">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                    </template>
                    <template x-if="currentMatch.winner && currentMatch.winner !== myTeam?.side">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </template>
                    <template x-if="!currentMatch.winner">
                        <span class="font-bold text-xl">-</span>
                    </template>
                </div>

                <h2 class="text-2xl font-bold text-gray-900 mb-2">
                    <span
                        x-text="currentMatch.winner === 'X' ? currentMatch.teams.X.name : (currentMatch.winner === 'O' ? currentMatch.teams.O.name : 'Hòa')"></span>
                </h2>
                <p class="text-sm font-semibold text-gray-600 mb-1">
                    <template x-if="currentMatch.winner">
                        <span>Đội <span x-text="currentMatch.winner"></span> giành chiến thắng!</span>
                    </template>
                    <template x-if="!currentMatch.winner">
                        <span>Trận đấu kết thúc với kết quả hòa.</span>
                    </template>
                </p>
                <p class="text-xs text-gray-500 mb-6"
                    x-text="'Lý do: ' + (currentMatch.finish_reason === 'win' ? 'Tạo 5 quân liên tiếp' : (currentMatch.finish_reason === 'timeout_forfeit' ? 'Đối thủ hết thời gian' : currentMatch.finish_reason))">
                </p>

                <button @click="showingWinnerPopup = false"
                    class="w-full py-2.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-900 font-bold rounded-lg transition-colors text-sm uppercase">Đóng</button>
            </div>
        </div>
    </template>

    <template x-if="!loading && !currentMatch">
        <div class="h-full bg-white rounded-xl border border-gray-100 shadow-sm p-6 overflow-y-auto">
            <template x-if="replayMode">
                <div class="max-w-xl mx-auto mt-10 bg-gray-50 border border-gray-200 rounded-xl p-6 text-center">
                    <h2 class="text-lg font-bold text-gray-900">Không thể tải replay</h2>
                    <p class="text-sm text-gray-600 mt-2">Trận đấu này không tồn tại hoặc bạn không có quyền xem.</p>
                    <a href="/student/history" class="inline-flex mt-4 px-4 py-2 rounded-lg bg-[#3547E5] text-white text-sm font-bold hover:bg-blue-700 transition-colors">Quay lại lịch sử</a>
                </div>
            </template>

            <template x-if="!replayMode">
                <div>
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Không có trận đấu hiện tại của nhóm bạn</h2>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
                    <div class="border border-purple-100 rounded-xl bg-purple-50/60 p-4">
                        <div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
                            <div class="flex-1">
                                <p class="text-sm font-bold text-gray-900">Tạo trận với Greedy Bot</p>
                                <input
                                    type="text"
                                    x-model="createBotRoomName"
                                    placeholder="Tên phòng (tùy chọn)"
                                    class="mt-2 w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                                >
                            </div>
                            <button
                                @click="createGreedyBotMatch()"
                                :disabled="isCreatingBotMatch || !canCreateBotMatch"
                                class="h-10 px-4 rounded-lg bg-[#3547E5] text-white text-sm font-bold hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <span x-show="!isCreatingBotMatch">Tạo trận với bot</span>
                                <span x-show="isCreatingBotMatch">Đang tạo...</span>
                            </button>
                        </div>
                        <p x-show="!canCreateBotMatch" class="text-xs font-semibold text-red-500 mt-2">Bạn cần tham gia một nhóm trước khi tạo trận.</p>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <h3 class="text-sm font-bold text-gray-500 uppercase mb-3">Đang diễn ra</h3>
                            <template x-if="otherMatches.current_matches.length === 0">
                                <p class="text-sm text-gray-400">Không có trận nào.</p>
                            </template>
                            <div class="space-y-2">
                                <template x-for="match in otherMatches.current_matches" :key="match.id">
                                    <div class="border border-gray-100 rounded-lg p-3 flex items-center justify-between">
                                        <div>
                                            <p class="text-sm font-bold text-gray-900" x-text="match.room_name"></p>
                                            <p class="text-xs text-gray-500"
                                                x-text="`${match.teams.X.name} vs ${match.teams.O.name}`"></p>
                                        </div>
                                        <span class="text-xs font-bold text-green-600">Đang diễn ra</span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-bold text-gray-500 uppercase mb-3">Sắp tới</h3>
                            <template x-if="otherMatches.upcoming_matches.length === 0">
                                <p class="text-sm text-gray-400">Không có trận nào.</p>
                            </template>
                            <div class="space-y-2">
                                <template x-for="match in otherMatches.upcoming_matches" :key="match.id">
                                    <div class="border border-gray-100 rounded-lg p-3 flex items-center justify-between">
                                        <div>
                                            <p class="text-sm font-bold text-gray-900" x-text="match.room_name"></p>
                                            <p class="text-xs text-gray-500"
                                                x-text="`${match.teams.X.name} vs ${match.teams.O.name}`"></p>
                                        </div>
                                        <span class="text-xs font-bold text-yellow-600">Sắp tới</span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-bold text-gray-500 uppercase mb-3">Đã xong</h3>
                            <template x-if="otherMatches.finished_matches.length === 0">
                                <p class="text-sm text-gray-400">Không có trận nào.</p>
                            </template>
                            <div class="space-y-2">
                                <template x-for="match in otherMatches.finished_matches" :key="match.id">
                                    <div class="border border-gray-100 rounded-lg p-3 flex items-center justify-between">
                                        <div>
                                            <p class="text-sm font-bold text-gray-900" x-text="match.room_name"></p>
                                            <p class="text-xs text-gray-500"
                                                x-text="`${match.teams.X.name} vs ${match.teams.O.name}`"></p>
                                        </div>
                                        <button @click="openReplayMatch(match.id)" class="text-xs font-bold text-[#3547E5] hover:underline">Xem lại</button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>
</div>

<script>
    function studentMatchPage() {
        return {
            loading: true,
            currentMatch: null,
            myTeam: null,
            replayMode: false,
            replayMatchId: null,
            lastRev: null,
            pollTimerId: null,
            pollInFlight: false,
            pollStopped: false,
            pollVisibilityListenerAdded: false,
            countdownTimerId: null,
            showingWinnerPopup: false,
            lastStatus: null,
            finishPopupTimerId: null,
            otherMatches: {
                current_matches: [],
                upcoming_matches: [],
                finished_matches: [],
            },
            labels: CONFIG.LABELS,
            turnSecondsLeft: null,
            cellSize: 20,
            boardPixelSize: CONFIG.BOARD_SIZE * 20,
            isCreatingBotMatch: false,
            createBotRoomName: '',
            isPlaying: false,
            speed: '1',
            playTimerId: null,
            currentStep: 0,
            highlightedLastMove: null,
            winningCells: [],
            boardRenderer: null,
            movePending: false,

            get canCreateBotMatch() {
                return !!(this.myTeam && this.myTeam.id);
            },

            get isPlaybackEnabled() {
                return !!(this.currentMatch && (this.replayMode || this.currentMatch.status === 'finished'));
            },

            get fullHistory() {
                if (!this.currentMatch || !Array.isArray(this.currentMatch.history)) {
                    return [];
                }
                return this.currentMatch.history;
            },

            get totalSteps() {
                return this.fullHistory.length;
            },

            get visibleHistory() {
                if (!this.isPlaybackEnabled) {
                    return this.fullHistory;
                }
                const step = Math.max(0, Math.min(this.currentStep, this.totalSteps));
                return this.fullHistory.slice(0, step);
            },

            get backUrl() {
                if (this.replayMode) return '/student/history';
                return '/student/dashboard';
            },

            get modeLabel() {
                const mode = this.currentMatch && this.currentMatch.mode;
                if (mode === 'pve_greedy') return 'PvE';
                if (mode === 'player_room') return 'Player Room';
                return 'AI vs AI';
            },

            get modeBadgeClass() {
                const mode = this.currentMatch && this.currentMatch.mode;
                if (mode === 'pve_greedy') return 'bg-purple-100 text-purple-700';
                if (mode === 'player_room') return 'bg-blue-100 text-blue-700';
                return 'bg-gray-100 text-gray-700';
            },

            get turnLabel() {
                if (!this.currentMatch) return '';
                if (this.currentMatch.status === 'waiting') return 'Đang chờ đối thủ';
                const side = this.currentMatch.current_turn || 'X';
                if (this.myTeam && this.myTeam.side === side) return `Lượt ${side} · Bạn`;
                const team = this.currentMatch.teams && this.currentMatch.teams[side];
                if (team && team.is_bot) return `Lượt ${side} · Greedy Bot`;
                return `Lượt ${side} · Đối thủ`;
            },

            get statusLabel() {
                const status = (this.currentMatch && this.currentMatch.status) || '';
                if (status === 'playing') return this.labels.STATUS_PLAYING;
                if (status === 'waiting') return this.labels.STATUS_WAITING;
                return this.labels.STATUS_FINISHED;
            },

            get turnCountdownDisplay() {
                if (this.turnSecondsLeft === null || this.turnSecondsLeft === undefined) return '';
                const v = Math.max(0, Number(this.turnSecondsLeft) || 0);
                return `${v}s`;
            },

            togglePlay() {
                if (!this.isPlaybackEnabled) {
                    return;
                }
                this.isPlaying = !this.isPlaying;
                if (this.isPlaying) {
                    this.startAutoPlay();
                } else {
                    this.stopAutoPlay();
                }
            },

            startAutoPlay() {
                this.stopAutoPlay();
                const speedValue = Math.max(0.25, Number(this.speed) || 1);
                const intervalMs = Math.max(120, Math.round(1000 / speedValue));

                this.playTimerId = setInterval(() => {
                    if (!this.isPlaying || !this.isPlaybackEnabled) {
                        return;
                    }
                    if (this.currentStep >= this.totalSteps) {
                        this.isPlaying = false;
                        this.stopAutoPlay();
                        return;
                    }
                    this.nextMove();
                }, intervalMs);
            },

            stopAutoPlay() {
                if (this.playTimerId) {
                    clearInterval(this.playTimerId);
                    this.playTimerId = null;
                }
            },

            onSpeedChange() {
                if (this.isPlaying) {
                    this.startAutoPlay();
                }
            },

            prevMove() {
                if (!this.isPlaybackEnabled) {
                    return;
                }
                if (this.currentStep > 0) {
                    this.currentStep -= 1;
                }
                this.updateHighlights();
            },

            nextMove() {
                if (!this.isPlaybackEnabled) {
                    return;
                }
                if (this.currentStep < this.totalSteps) {
                    this.currentStep += 1;
                }
                this.updateHighlights();
            },

            seek() {
                if (!this.isPlaybackEnabled) {
                    return;
                }
                this.currentStep = Math.max(0, Math.min(Number(this.currentStep) || 0, this.totalSteps));
                this.updateHighlights();
            },

            openReplayMatch(matchId) {
                if (!matchId) return;
                const normalized = String(matchId);
                localStorage.setItem('qx_student_view_match', normalized);
                window.location.href = `/student/match?mode=replay&match_id=${encodeURIComponent(normalized)}`;
            },

            syncReplayStep(resetToEnd = false) {
                if (!this.currentMatch) {
                    this.currentStep = 0;
                    this.highlightedLastMove = null;
                    this.winningCells = [];
                    this.isPlaying = false;
                    this.stopAutoPlay();
                    return;
                }

                if (this.isPlaybackEnabled) {
                    if (resetToEnd || this.currentStep > this.totalSteps) {
                        this.currentStep = this.totalSteps;
                    }
                } else {
                    this.currentStep = this.totalSteps;
                    this.isPlaying = false;
                    this.stopAutoPlay();
                }

                this.updateHighlights();
            },

            updateHighlights() {
                const moves = this.visibleHistory;
                this.highlightedLastMove = moves.length ? moves[moves.length - 1] : null;
                this.winningCells = this.detectWinningCells(moves);
                this.renderBoard();
            },

            initBoardRenderer() {
                if (this.boardRenderer || !this.$refs.boardCanvas || !window.QXBoardCanvas) return;
                this.boardRenderer = window.QXBoardCanvas.create(this.$refs.boardCanvas, {
                    interactive: true,
                    onCellClick: (x, y) => this.submitHumanMove(x, y),
                });
                this.renderBoard();
            },

            renderBoard() {
                if (!this.boardRenderer) this.initBoardRenderer();
                if (!this.boardRenderer) return;
                this.boardRenderer.setState({
                    board: this.currentMatch ? this.currentMatch.board : null,
                    history: this.visibleHistory,
                    currentStep: null,
                    lastMove: this.highlightedLastMove,
                    winningCells: this.winningCells,
                    currentTurn: this.currentMatch ? this.currentMatch.current_turn : null,
                    mySide: this.myTeam ? this.myTeam.side : null,
                    status: this.currentMatch ? this.currentMatch.status : null,
                });
            },

            async submitHumanMove(x, y) {
                if (this.movePending || this.replayMode || !this.currentMatch || !this.myTeam) return;
                if (this.currentMatch.status !== 'playing' || this.currentMatch.current_turn !== this.myTeam.side) return;
                this.movePending = true;
                try {
                    const result = await window.QXApi.matches.submitMove(this.currentMatch.id, { x, y });
                    this.currentMatch = (result.data || {}).match || this.currentMatch;
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.updateCountdown();
                    this.handleStatusTransitions();
                    this.syncReplayStep(true);
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể gửi nước đi.', 'error');
                    }
                } finally {
                    this.movePending = false;
                }
            },

            detectWinningCells(moves) {
                if (!this.currentMatch || this.currentMatch.status !== 'finished' || this.currentMatch.finish_reason !== 'win') {
                    return [];
                }
                if (!moves.length) {
                    return [];
                }

                const last = moves[moves.length - 1];
                if (!last || !last.team || this.currentMatch.winner !== last.team) {
                    return [];
                }

                const size = Number(CONFIG.BOARD_SIZE) || 40;
                const board = Array.from({ length: size }, () => Array(size).fill(0));
                for (const move of moves) {
                    const x = Number(move.x);
                    const y = Number(move.y);
                    if (!Number.isInteger(x) || !Number.isInteger(y) || x < 0 || y < 0 || x >= size || y >= size) {
                        continue;
                    }
                    board[x][y] = move.team === 'X' ? 1 : 2;
                }

                const value = last.team === 'X' ? 1 : 2;
                const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
                const lx = Number(last.x);
                const ly = Number(last.y);

                if (!Number.isInteger(lx) || !Number.isInteger(ly)) {
                    return [];
                }

                for (const [dx, dy] of directions) {
                    const cells = [{ x: lx, y: ly }];

                    let step = 1;
                    while (true) {
                        const nx = lx + dx * step;
                        const ny = ly + dy * step;
                        if (nx < 0 || ny < 0 || nx >= size || ny >= size) break;
                        if (board[nx][ny] !== value) break;
                        cells.push({ x: nx, y: ny });
                        step += 1;
                    }

                    step = 1;
                    while (true) {
                        const nx = lx - dx * step;
                        const ny = ly - dy * step;
                        if (nx < 0 || ny < 0 || nx >= size || ny >= size) break;
                        if (board[nx][ny] !== value) break;
                        cells.unshift({ x: nx, y: ny });
                        step += 1;
                    }

                    if (cells.length >= 5) {
                        return cells;
                    }
                }

                return [];
            },

            async init() {
                this.$nextTick(() => this.initBoardRenderer());
                const params = new URLSearchParams(window.location.search);
                const queryMatchId = (params.get('match_id') || '').trim();
                const rawView = queryMatchId || localStorage.getItem('qx_student_view_match');
                if (rawView) {
                    this.replayMode = true;
                    this.replayMatchId = rawView;
                    localStorage.removeItem('qx_student_view_match');

                    await this.loadMatchById(rawView);
                    this.startCountdown();
                    if (!this.currentMatch) {
                        if (window.QXToast && window.QXToast.show) {
                            window.QXToast.show('Không thể tải replay của trận này.', 'error');
                        }
                    }
                    return;
                }

                await this.loadMyMatchFull();
                this.startPolling();
                this.startCountdown();
            },

            async loadMatchById(matchId) {
                this.loading = true;
                try {
                    const result = await window.QXApi.matches.getMatch(matchId);
                    const data = result.data || {};
                    this.currentMatch = data.match || null;
                    this.myTeam = null;
                    this.otherMatches = {
                        current_matches: [],
                        upcoming_matches: [],
                        finished_matches: [],
                    };
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.updateCountdown();
                    this.handleStatusTransitions();
                    this.syncReplayStep(true);
                } catch (error) {
                    this.currentMatch = null;
                    this.myTeam = null;
                    this.syncReplayStep(true);
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể tải trận đấu.', 'error');
                    }
                } finally {
                    this.loading = false;
                }
            },

            startPolling() {
                this.pollStopped = false;
                if (this.pollTimerId) {
                    clearTimeout(this.pollTimerId);
                }

                if (!this.pollVisibilityListenerAdded) {
                    this.pollVisibilityListenerAdded = true;
                    document.addEventListener('visibilitychange', () => {
                        if (!document.hidden) {
                            this.loadMyMatchSummary();
                        }
                    }, { passive: true });
                }

                const delayMs = Math.max(200, Number(CONFIG.MATCH_STEP_DELAY_MS) || 750);
                const loop = async () => {
                    if (this.pollStopped) return;

                    if (document.hidden) {
                        this.pollTimerId = setTimeout(loop, Math.min(5000, delayMs));
                        return;
                    }

                    if (this.pollInFlight) {
                        this.pollTimerId = setTimeout(loop, delayMs);
                        return;
                    }

                    this.pollInFlight = true;
                    try {
                        await this.loadMyMatchSummary();
                    } finally {
                        this.pollInFlight = false;
                    }

                    this.pollTimerId = setTimeout(loop, delayMs);
                };

                loop();
            },

            stopPolling() {
                this.pollStopped = true;
                if (this.pollTimerId) {
                    clearTimeout(this.pollTimerId);
                    this.pollTimerId = null;
                }
            },

            startCountdown() {
                if (this.countdownTimerId) {
                    clearInterval(this.countdownTimerId);
                }

                this.countdownTimerId = setInterval(() => {
                    this.updateCountdown();
                }, 200);
            },

            updateCountdown() {
                const match = this.currentMatch;
                if (!match || match.status !== 'playing') {
                    this.turnSecondsLeft = null;
                    return;
                }

                const iso = match.turn_deadline_at;
                if (!iso) {
                    this.turnSecondsLeft = null;
                    return;
                }

                const deadline = new Date(iso);
                if (Number.isNaN(deadline.getTime())) {
                    this.turnSecondsLeft = null;
                    return;
                }

                const diffMs = deadline.getTime() - Date.now();
                const left = Math.max(0, Math.ceil(diffMs / 1000));
                this.turnSecondsLeft = left;
            },

            copyApiBody() {
                const text = this.apiBody;
                window.QXCopy(text, 'Đã sao chép API Body');
            },

            mergeSummaryIntoCurrentMatch(summary) {
                if (!summary) return;
                if (!this.currentMatch || this.currentMatch.id !== summary.id) {
                    this.currentMatch = summary;
                    this.lastRev = Number(summary.rev);
                    return;
                }

                const prev = this.currentMatch;
                const mergedTeams = {
                    X: {
                        ...(prev.teams?.X || {}),
                        ...(summary.teams?.X || {}),
                    },
                    O: {
                        ...(prev.teams?.O || {}),
                        ...(summary.teams?.O || {}),
                    },
                };

                this.currentMatch = {
                    ...prev,
                    ...summary,
                    teams: mergedTeams,
                    history: prev.history || [],
                    events: prev.events || [],
                };
                this.lastRev = Number(summary.rev);
                this.syncReplayStep(false);
            },

            handleStatusTransitions() {
                if (this.currentMatch) {
                    if (this.lastStatus && this.lastStatus !== 'finished' && this.currentMatch.status === 'finished') {
                        if (this.finishPopupTimerId) clearTimeout(this.finishPopupTimerId);
                        this.finishPopupTimerId = setTimeout(() => { this.showingWinnerPopup = true; this.finishPopupTimerId = null; }, 1200);
                    }
                    this.lastStatus = this.currentMatch.status;
                } else {
                    this.lastStatus = null;
                    if (this.finishPopupTimerId) { clearTimeout(this.finishPopupTimerId); this.finishPopupTimerId = null; }
                    this.showingWinnerPopup = false;
                }
            },

            async loadMyMatchFull(showLoading = true) {
                if (showLoading) {
                    this.loading = true;
                }
                try {
                    const result = await window.QXApi.matches.getMyMatch();
                    const data = result.data || {};
                    this.currentMatch = data.my_current_match || null;
                    this.myTeam = data.my_team || null;
                    this.otherMatches = data.other_matches || {
                        current_matches: [],
                        upcoming_matches: [],
                        finished_matches: [],
                    };
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.updateCountdown();
                    this.handleStatusTransitions();
                    this.syncReplayStep(true);
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể tải dữ liệu trận đấu.', 'error');
                    }
                } finally {
                    if (showLoading) {
                        this.loading = false;
                    }
                }
            },

            async loadMyMatchSummary() {
                try {
                    if (this.replayMode) {
                        return;
                    }
                    const sinceRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    const result = await window.QXApi.matches.getMyMatchSummary(sinceRev);
                    const data = result.data || {};

                    const summaryMatch = data.my_current_match || null;
                    const revChanged = !!data.rev_changed;

                    // No match for me: show other matches list.
                    if (!summaryMatch) {
                        this.currentMatch = null;
                        this.myTeam = data.my_team || null;
                        this.otherMatches = data.other_matches || {
                            current_matches: [],
                            upcoming_matches: [],
                            finished_matches: [],
                        };
                        this.updateCountdown();
                        this.handleStatusTransitions();
                        this.syncReplayStep(true);
                        if (this.loading) this.loading = false;
                        return;
                    }

                    // If match id changed (new match created), refresh full.
                    if (!this.currentMatch || this.currentMatch.id !== summaryMatch.id) {
                        if (!this.currentMatch) {
                        await this.loadMyMatchFull(false);
                    }
                        if (this.loading) this.loading = false;
                        return;
                    }

                    // Merge light fields (status/turn/deadline/connectivity) every poll.
                    this.mergeSummaryIntoCurrentMatch(summaryMatch);
                    this.myTeam = data.my_team || this.myTeam;
                    this.updateCountdown();
                    this.handleStatusTransitions();
                    if (this.loading) this.loading = false;

                    // Only refresh full payload when something actually changed.
                    if (revChanged) {
                        await this.loadMyMatchFull(false);
                    }
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể tải dữ liệu trận đấu.', 'error');
                    }
                } finally {
                    if (this.loading) {
                        this.loading = false;
                    }
                }
            },

            async joinPlayerRoom(matchId) {
                try {
                    const result = await window.QXApi.matches.joinPlayerRoom(matchId);
                    const data = result.data || {};
                    this.currentMatch = data.match || null;
                    this.myTeam = data.my_team || this.myTeam;
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.syncReplayStep(true);
                    this.$nextTick(() => this.renderBoard());
                    if (window.QXToast && window.QXToast.show) window.QXToast.show('Đã tham gia phòng.', 'success');
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) window.QXToast.show(error.message || 'Không thể tham gia phòng.', 'error');
                }
            },

            async createPlayerRoom() {
                if (this.isCreatingPlayerRoom || !this.canCreateBotMatch) return;
                this.isCreatingPlayerRoom = true;
                try {
                    const result = await window.QXApi.matches.createPlayerRoom({
                        room_name: (this.createRoomName || '').trim() || null,
                        visibility: this.createRoomVisibility || 'public',
                    });
                    const data = result.data || {};
                    this.currentMatch = data.match || null;
                    this.myTeam = data.my_team || this.myTeam;
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.createRoomName = '';
                    this.syncReplayStep(true);
                    this.$nextTick(() => this.renderBoard());
                    if (window.QXToast && window.QXToast.show) window.QXToast.show('Đã tạo phòng chơi.', 'success');
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) window.QXToast.show(error.message || 'Không thể tạo phòng.', 'error');
                } finally {
                    this.isCreatingPlayerRoom = false;
                }
            },

            async createGreedyBotMatch() {
                if (this.isCreatingBotMatch || !this.canCreateBotMatch) {
                    return;
                }

                this.isCreatingBotMatch = true;
                try {
                    const payload = {
                        room_name: (this.createBotRoomName || '').trim() || null,
                    };

                    const result = await window.QXApi.matches.createGreedyBotMatch(payload);
                    const data = result.data || {};
                    this.currentMatch = data.match || null;
                    this.myTeam = data.my_team || this.myTeam;
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.createBotRoomName = '';
                    this.updateCountdown();
                    this.syncReplayStep(true);
                    this.$nextTick(() => this.renderBoard());

                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show('Đã tạo trận với Greedy Bot.', 'success');
                    }
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể tạo trận với bot.', 'error');
                    }
                } finally {
                    this.isCreatingBotMatch = false;
                }
            },
        };
    }
</script>
