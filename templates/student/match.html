{% extends "student/base_student.html" %}

{% block student_content %}
<div x-data="studentMatchPage()" x-init="init()" class="h-[calc(100vh-8rem)]">
    <template x-if="loading">
        <div class="h-full flex items-center justify-center bg-white rounded-xl border border-gray-100 shadow-sm">
            <p class="text-sm font-semibold text-gray-600">Đang tải dữ liệu trận đấu...</p>
        </div>
    </template>

    <template x-if="!loading && currentMatch">
        <div class="flex h-full flex-col lg:flex-row gap-6">
            <div
                class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden relative">
                <div
                    class="h-14 bg-white border-b border-gray-100 flex items-center justify-between px-6 shrink-0 z-10">
                    <div class="flex items-center space-x-4">
                        <a :href="backUrl"
                            class="inline-flex items-center text-sm font-semibold text-gray-500 hover:text-[#3547E5] transition-colors border-r border-gray-200 pr-4 mr-2">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                            </svg>
                            Quay lại
                        </a>
                        <div class="flex items-center space-x-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"
                                :class="currentMatch && currentMatch.status === 'playing' ? 'bg-green-500' : 'bg-gray-500'"></span>
                            <span class="text-sm font-bold text-gray-900" x-text="statusLabel"></span>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="hidden md:flex items-center gap-2 text-xs font-bold text-gray-500">
                            <span x-text="`${visibleHistory.length}/${totalSteps} nước`"></span>
                            <span x-show="currentMatch && currentMatch.status === 'playing'" class="text-gray-900 font-mono" x-text="turnCountdownDisplay"></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase" :class="modeBadgeClass" x-text="modeLabel"></span>
                            <span x-show="currentMatch" class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-blue-50 text-blue-700" x-text="turnLabel"></span>
                            <div class="text-sm font-semibold text-gray-900" x-text="currentMatch ? currentMatch.room_name : ''"></div>
                        </div>
                        <button x-show="canSurrender" @click="showSurrenderConfirm = true" class="px-3 py-1.5 rounded-lg bg-red-50 text-red-600 text-xs font-bold hover:bg-red-100 transition-colors">Đầu hàng</button>
                    </div>
                </div>

                <div class="flex-1 overflow-auto bg-slate-50 p-4 relative" id="board-container" @wheel.prevent="handleBoardWheel($event)">
                    <div class="absolute top-4 right-4 z-10 flex items-center gap-1 bg-white/95 border border-blue-100 rounded-xl shadow-sm p-1">
                        <button @click="zoomOut" class="w-8 h-8 rounded-lg text-blue-700 font-bold hover:bg-blue-50">-</button>
                        <span class="min-w-12 text-center text-xs font-bold text-gray-600" x-text="zoomPercent"></span>
                        <button @click="zoomIn" class="w-8 h-8 rounded-lg text-blue-700 font-bold hover:bg-blue-50">+</button>
                        <button @click="resetZoom" class="px-2 h-8 rounded-lg text-xs font-bold text-gray-500 hover:bg-gray-50">Reset</button>
                        <button @click="fitBoard" class="px-2 h-8 rounded-lg text-xs font-bold text-gray-500 hover:bg-gray-50">Fit board</button>
                        <button @click="focusMoves" class="px-2 h-8 rounded-lg text-xs font-bold text-gray-500 hover:bg-gray-50">Focus moves</button>
                    </div>
                    <div class="absolute top-4 left-4 z-10 bg-white/95 border border-blue-100 rounded-lg shadow-sm px-3 py-2 text-xs font-bold text-gray-700 min-w-28">
                        <span x-show="hoverCell" x-text="`Tọa độ: (${hoverCell.x}, ${hoverCell.y})`"></span>
                        <span x-show="!hoverCell" class="text-gray-400">Hover để xem tọa độ</span>
                    </div>
                    <div class="min-h-full flex items-center justify-center pt-12">
                        <canvas x-ref="boardCanvas" x-effect="renderBoard()" class="bg-white shadow-lg border border-blue-200 mx-auto rounded-sm"></canvas>
                    </div>
                </div>

                <div x-show="isPlaybackEnabled" class="h-20 bg-white border-t border-gray-100 flex items-center px-4 gap-3 shrink-0 z-10 select-none">
                    <div class="text-xs font-bold text-gray-700 w-28" x-text="`Move ${currentStep} / ${totalSteps}`"></div>
                    <div class="flex items-center gap-1">
                        <button @click="firstMove" class="w-8 h-8 rounded hover:bg-gray-100 text-gray-600 font-bold">|‹</button>
                        <button @click="prevMove" class="w-8 h-8 rounded hover:bg-gray-100 text-gray-600 font-bold">‹</button>
                        <button @click="togglePlay" class="w-10 h-10 rounded-full bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold" x-text="isPlaying ? 'Ⅱ' : '▶'"></button>
                        <button @click="nextMove" class="w-8 h-8 rounded hover:bg-gray-100 text-gray-600 font-bold">›</button>
                        <button @click="lastMove" class="w-8 h-8 rounded hover:bg-gray-100 text-gray-600 font-bold">›|</button>
                    </div>
                    <div class="flex-1 relative">
                        <input type="range" min="0" :max="totalSteps" x-model.number="currentStep" @input="seek" @mousemove="updateReplayTooltip($event)" @mouseleave="replayTooltip = ''"
                            class="w-full h-2 bg-blue-100 rounded-lg appearance-none cursor-pointer accent-[#2563EB]">
                        <div x-show="replayTooltip" class="absolute -top-8 px-2 py-1 bg-gray-900 text-white text-[10px] rounded pointer-events-none" :style="replayTooltipStyle" x-text="replayTooltip"></div>
                    </div>
                    <select x-model="speed" @change="onSpeedChange" class="bg-gray-50 border border-gray-200 text-gray-700 text-xs font-bold py-1.5 px-2 rounded outline-none focus:border-[#2563EB] cursor-pointer">
                        <option value="0.5">0.5x</option>
                        <option value="1">1x</option>
                        <option value="2">2x</option>
                    </select>
                </div>
            </div>

            <div class="w-full lg:w-80 flex flex-col gap-4 shrink-0 h-full overflow-hidden">
                <div x-show="currentMatch.status === 'finished'" class="bg-white rounded-xl shadow-sm border border-amber-100 p-4 shrink-0">
                    <div class="text-xs font-bold text-amber-600 uppercase tracking-widest mb-2">Kết quả trận đấu</div>
                    <div class="text-lg font-bold text-gray-900" x-text="resultTitle"></div>
                    <div class="mt-2 grid grid-cols-2 gap-2 text-xs text-gray-600">
                        <div><span class="font-bold">Lý do:</span> <span x-text="finishReasonLabel"></span></div>
                        <div><span class="font-bold">Số nước:</span> <span x-text="totalSteps"></span></div>
                        <div><span class="font-bold">Trạng thái:</span> <span x-text="statusLabel"></span></div>
                        <div><span class="font-bold">Tỉ số:</span> <span x-text="scoreLabel"></span></div>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 shrink-0">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Các đội</h3>

                    <div class="space-y-3">
                        <div class="flex items-center justify-between p-3 rounded-lg border-l-4 border-blue-500 bg-blue-50/40">
                            <div class="flex items-center gap-3">
                                <span class="text-3xl text-[#2563EB] leading-none">X</span>
                                <div>
                                    <span class="font-bold text-gray-900 text-sm block" x-text="currentMatch.teams.X.name"></span>
                                    <span class="text-[10px] text-gray-400" x-text="currentMatch.teams.X.is_connected ? 'online' : 'offline'"></span>
                                </div>
                            </div>
                            <span x-show="currentMatch.winner === 'X'" class="px-2 py-1 rounded-full bg-amber-100 text-amber-700 text-[10px] font-bold">Winner</span>
                            <span x-show="currentMatch.status !== 'finished' && currentMatch.current_turn === 'X'" class="px-2 py-1 rounded-full bg-blue-100 text-blue-700 text-[10px] font-bold">Đang lượt</span>
                        </div>

                        <div class="flex items-center justify-between p-3 rounded-lg border-l-4 border-red-500 bg-red-50/40">
                            <div class="flex items-center gap-3">
                                <span class="text-3xl text-[#DC2626] leading-none">O</span>
                                <div>
                                    <span class="font-bold text-gray-900 text-sm block" x-text="currentMatch.teams.O.name"></span>
                                    <span class="text-[10px] text-gray-400" x-text="currentMatch.teams.O.is_connected ? 'online' : 'offline'"></span>
                                </div>
                            </div>
                            <span x-show="currentMatch.winner === 'O'" class="px-2 py-1 rounded-full bg-amber-100 text-amber-700 text-[10px] font-bold">Winner</span>
                            <span x-show="currentMatch.status !== 'finished' && currentMatch.current_turn === 'O'" class="px-2 py-1 rounded-full bg-red-100 text-red-700 text-[10px] font-bold">Đang lượt</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden">
                    <div class="p-4 border-b border-gray-100 bg-gray-50/50">
                        <h3 class="text-xs font-bold text-gray-900 uppercase">Lịch sử nước đi</h3>
                    </div>
                    <div class="flex-1 overflow-y-auto p-0">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-50 sticky top-0">
                                <tr>
                                    <th class="px-3 py-2 text-xs font-semibold text-gray-500">#</th>
                                    <th class="px-3 py-2 text-xs font-semibold text-gray-500">Đội</th>
                                    <th class="px-3 py-2 text-xs font-semibold text-gray-500 text-right">Tọa độ</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <template x-for="(move, index) in visibleHistory" :key="move.order">
                                    <tr class="text-xs cursor-pointer hover:bg-blue-50" @mouseenter="highlightMove(move)" @mouseleave="clearHighlightedMove" @click="goToMove(move.order)" :class="{'bg-blue-50/70': index === visibleHistory.length - 1}">
                                        <td class="px-3 py-2 text-gray-500 font-mono" x-text="move.order"></td>
                                        <td class="px-3 py-2 font-bold"
                                            :class="move.team === 'X' ? 'text-[#3547E5]' : 'text-[#E53535]'"
                                            x-text="move.team"></td>
                                        <td class="px-3 py-2 text-gray-700 font-mono text-right" x-text="move.coord">
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden" :class="eventLogCollapsed ? 'h-14' : 'h-52'">
                    <button @click="eventLogCollapsed = !eventLogCollapsed" class="p-4 border-b border-gray-100 bg-gray-50/50 flex items-center justify-between text-left">
                        <h3 class="text-xs font-bold text-gray-900 uppercase">Nhật ký trận đấu</h3>
                        <span class="text-[10px] font-semibold text-gray-500" x-text="eventLogCollapsed ? 'Mở' : 'Thu gọn'"></span>
                    </button>
                    <div x-show="!eventLogCollapsed" class="flex-1 overflow-y-auto p-2 space-y-1">
                        <template x-if="!currentMatch.events || currentMatch.events.length === 0">
                            <p class="text-xs text-gray-400 px-2 py-1">Chưa có sự kiện.</p>
                        </template>
                        <template x-for="(eventItem, idx) in (currentMatch.events || []).slice().reverse()" :key="`${eventItem.created_at}-${idx}`">
                            <div class="px-2 py-1.5 rounded border border-gray-100 bg-white" :title="eventItem.created_at || ''">
                                <p class="text-xs text-gray-900" x-text="eventLabel(eventItem)"></p>
                            </div>
                        </template>
                    </div>
                </div>

            </div>
        </div>
    </template>

    <!-- Winner Popup -->
    <template x-if="currentMatch && currentMatch.status === 'finished' && showingWinnerPopup">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm" x-transition>
            <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center border-t-4"
                :class="currentMatch.winner === myTeam?.side ? 'border-green-500' : (currentMatch.winner ? 'border-red-500' : 'border-gray-500')">
                <div class="w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4"
                    :class="currentMatch.winner === myTeam?.side ? 'bg-green-100 text-green-600' : (currentMatch.winner ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-600')">
                    <template x-if="currentMatch.winner === myTeam?.side">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                    </template>
                    <template x-if="currentMatch.winner && currentMatch.winner !== myTeam?.side">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </template>
                    <template x-if="!currentMatch.winner">
                        <span class="font-bold text-xl">-</span>
                    </template>
                </div>

                <h2 class="text-2xl font-bold text-gray-900 mb-2">
                    <span
                        x-text="currentMatch.winner === 'X' ? currentMatch.teams.X.name : (currentMatch.winner === 'O' ? currentMatch.teams.O.name : 'Hòa')"></span>
                </h2>
                <p class="text-sm font-semibold text-gray-600 mb-1">
                    <template x-if="currentMatch.winner">
                        <span>Đội <span x-text="currentMatch.winner"></span> giành chiến thắng!</span>
                    </template>
                    <template x-if="!currentMatch.winner">
                        <span>Trận đấu kết thúc với kết quả hòa.</span>
                    </template>
                </p>
                <p class="text-xs text-gray-500 mb-6"
                    x-text="'Lý do: ' + (currentMatch.finish_reason === 'win' ? 'Tạo 5 quân liên tiếp' : (currentMatch.finish_reason === 'timeout_forfeit' ? 'Đối thủ hết thời gian' : currentMatch.finish_reason))">
                </p>

                <div class="space-y-2">
                    <button @click="openReplayMatch(currentMatch.id)"
                        class="w-full py-2.5 px-4 bg-[#2563EB] hover:bg-blue-700 text-white font-bold rounded-lg transition-colors text-sm uppercase">Xem lại trận</button>
                    <button @click="showingWinnerPopup = false"
                        class="w-full py-2.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-900 font-bold rounded-lg transition-colors text-sm uppercase">Đóng</button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="currentMatch && showSurrenderConfirm">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm" x-transition>
            <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4 border border-red-100">
                <h2 class="text-xl font-bold text-gray-900 mb-2">Xác nhận đầu hàng?</h2>
                <p class="text-sm text-gray-600 mb-6">Trận đấu sẽ kết thúc ngay và đối thủ được tính thắng. Bạn vẫn có thể xem lại replay sau đó.</p>
                <div class="flex gap-2">
                    <button @click="showSurrenderConfirm = false" class="flex-1 py-2.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-900 font-bold rounded-lg transition-colors text-sm">Hủy</button>
                    <button @click="confirmSurrender" :disabled="surrenderPending" class="flex-1 py-2.5 px-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors text-sm disabled:opacity-60">
                        <span x-show="!surrenderPending">Đầu hàng</span>
                        <span x-show="surrenderPending">Đang xử lý...</span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="!loading && !currentMatch">
        <div class="h-full bg-white rounded-xl border border-gray-100 shadow-sm p-6 overflow-y-auto">
            <template x-if="replayMode">
                <div class="max-w-xl mx-auto mt-10 bg-gray-50 border border-gray-200 rounded-xl p-6 text-center">
                    <h2 class="text-lg font-bold text-gray-900">Không thể tải replay</h2>
                    <p class="text-sm text-gray-600 mt-2">Trận đấu này không tồn tại hoặc bạn không có quyền xem.</p>
                    <a href="/student/history" class="inline-flex mt-4 px-4 py-2 rounded-lg bg-[#3547E5] text-white text-sm font-bold hover:bg-blue-700 transition-colors">Quay lại lịch sử</a>
                </div>
            </template>

            <template x-if="!replayMode">
                <div>
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Không có trận đấu hiện tại của nhóm bạn</h2>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
                    <div class="border border-purple-100 rounded-xl bg-purple-50/60 p-4">
                        <div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
                            <div class="flex-1">
                                <p class="text-sm font-bold text-gray-900">Tạo trận với Greedy Bot</p>
                                <input
                                    type="text"
                                    x-model="createBotRoomName"
                                    placeholder="Tên phòng (tùy chọn)"
                                    class="mt-2 w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                                >
                            </div>
                            <button
                                @click="createGreedyBotMatch()"
                                :disabled="isCreatingBotMatch || !canCreateBotMatch"
                                class="h-10 px-4 rounded-lg bg-[#3547E5] text-white text-sm font-bold hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <span x-show="!isCreatingBotMatch">Tạo trận với bot</span>
                                <span x-show="isCreatingBotMatch">Đang tạo...</span>
                            </button>
                        </div>
                        <p x-show="!canCreateBotMatch" class="text-xs font-semibold text-red-500 mt-2">Bạn cần tham gia một nhóm trước khi tạo trận.</p>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <h3 class="text-sm font-bold text-gray-500 uppercase mb-3">Trận gần đây của tôi</h3>
                            <template x-if="recentMatches.length === 0">
                                <p class="text-sm text-gray-400">Chưa có trận gần đây.</p>
                            </template>
                            <div class="space-y-2">
                                <template x-for="match in recentMatches" :key="match.id">
                                    <div class="border border-blue-100 rounded-lg p-3 bg-white flex items-center justify-between">
                                        <div>
                                            <p class="text-sm font-bold text-gray-900" x-text="match.room_name || match.id"></p>
                                            <p class="text-xs text-gray-500" x-text="`${match.teams.X.name} vs ${match.teams.O.name}`"></p>
                                            <p class="text-[11px] font-semibold" :class="match.winner === match.my_side ? 'text-blue-600' : (match.winner ? 'text-red-600' : 'text-gray-500')" x-text="match.winner ? `Thắng: ${match.winner}` : 'Hòa'"></p>
                                        </div>
                                        <button @click="openReplayMatch(match.id)" class="text-xs font-bold text-[#2563EB] hover:underline">Xem lại</button>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-bold text-gray-500 uppercase mb-3">Đang diễn ra</h3>
                            <template x-if="otherMatches.current_matches.length === 0">
                                <p class="text-sm text-gray-400">Không có trận nào.</p>
                            </template>
                            <div class="space-y-2">
                                <template x-for="match in otherMatches.current_matches" :key="match.id">
                                    <div class="border border-gray-100 rounded-lg p-3 flex items-center justify-between">
                                        <div>
                                            <p class="text-sm font-bold text-gray-900" x-text="match.room_name"></p>
                                            <p class="text-xs text-gray-500"
                                                x-text="`${match.teams.X.name} vs ${match.teams.O.name}`"></p>
                                        </div>
                                        <span class="text-xs font-bold text-green-600">Đang diễn ra</span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-bold text-gray-500 uppercase mb-3">Sắp tới</h3>
                            <template x-if="otherMatches.upcoming_matches.length === 0">
                                <p class="text-sm text-gray-400">Không có trận nào.</p>
                            </template>
                            <div class="space-y-2">
                                <template x-for="match in otherMatches.upcoming_matches" :key="match.id">
                                    <div class="border border-gray-100 rounded-lg p-3 flex items-center justify-between">
                                        <div>
                                            <p class="text-sm font-bold text-gray-900" x-text="match.room_name"></p>
                                            <p class="text-xs text-gray-500"
                                                x-text="`${match.teams.X.name} vs ${match.teams.O.name}`"></p>
                                        </div>
                                        <span class="text-xs font-bold text-yellow-600">Sắp tới</span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-bold text-gray-500 uppercase mb-3">Đã xong</h3>
                            <template x-if="otherMatches.finished_matches.length === 0">
                                <p class="text-sm text-gray-400">Không có trận nào.</p>
                            </template>
                            <div class="space-y-2">
                                <template x-for="match in otherMatches.finished_matches" :key="match.id">
                                    <div class="border border-gray-100 rounded-lg p-3 flex items-center justify-between">
                                        <div>
                                            <p class="text-sm font-bold text-gray-900" x-text="match.room_name"></p>
                                            <p class="text-xs text-gray-500"
                                                x-text="`${match.teams.X.name} vs ${match.teams.O.name}`"></p>
                                        </div>
                                        <button @click="openReplayMatch(match.id)" class="text-xs font-bold text-[#3547E5] hover:underline">Xem lại</button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>
</div>

<script>
    function studentMatchPage() {
        return {
            loading: true,
            currentMatch: null,
            myTeam: null,
            replayMode: false,
            replayMatchId: null,
            lastRev: null,
            pollTimerId: null,
            pollInFlight: false,
            pollStopped: false,
            pollVisibilityListenerAdded: false,
            countdownTimerId: null,
            showingWinnerPopup: false,
            lastStatus: null,
            finishPopupTimerId: null,
            otherMatches: {
                current_matches: [],
                upcoming_matches: [],
                finished_matches: [],
            },
            labels: CONFIG.LABELS,
            turnSecondsLeft: null,
            cellSize: Number(localStorage.getItem('qx_board_cell_size')) || 20,
            boardPixelSize: CONFIG.BOARD_SIZE * 20,
            displayHistoryLimit: 0,
            moveQueue: [],
            queueTimerId: null,
            isQueuePlaying: false,
            liveMoveDelayMs: 500,
            recentMatches: [],
            showSurrenderConfirm: false,
            surrenderPending: false,
            isCreatingBotMatch: false,
            createBotRoomName: '',
            isPlaying: false,
            speed: '1',
            playTimerId: null,
            currentStep: 0,
            highlightedLastMove: null,
            highlightedCell: null,
            hoverCell: null,
            replayTooltip: '',
            replayTooltipStyle: 'left:0px',
            eventLogCollapsed: true,
            winningCells: [],
            boardRenderer: null,
            movePending: false,

            get canCreateBotMatch() {
                return !!(this.myTeam && this.myTeam.id);
            },

            get isPlaybackEnabled() {
                return !!(this.currentMatch && (this.replayMode || this.currentMatch.status === 'finished'));
            },

            get canSurrender() {
                return !!(this.currentMatch && !this.replayMode && ['waiting', 'playing'].includes(this.currentMatch.status));
            },

            get zoomPercent() {
                return `${Math.round((Number(this.cellSize) || 20) / 20 * 100)}%`;
            },

            get fullHistory() {
                if (!this.currentMatch || !Array.isArray(this.currentMatch.history)) {
                    return [];
                }
                return this.currentMatch.history;
            },

            get totalSteps() {
                return this.fullHistory.length;
            },

            get visibleHistory() {
                if (!this.replayMode && (this.isQueuePlaying || this.moveQueue.length || (this.displayHistoryLimit || 0) < this.totalSteps)) {
                    const limit = Math.max(0, Math.min(this.displayHistoryLimit || 0, this.totalSteps));
                    return this.fullHistory.slice(0, limit);
                }
                if (!this.isPlaybackEnabled) {
                    return this.fullHistory;
                }
                const step = Math.max(0, Math.min(this.currentStep, this.totalSteps));
                return this.fullHistory.slice(0, step);
            },

            get backUrl() {
                if (this.replayMode) return '/student/history';
                return '/student/dashboard';
            },

            get modeLabel() {
                const mode = this.currentMatch && this.currentMatch.mode;
                if (mode === 'pve_greedy') return 'PvE';
                if (mode === 'player_room') return 'Player Room';
                return 'AI vs AI';
            },

            get modeBadgeClass() {
                const mode = this.currentMatch && this.currentMatch.mode;
                if (mode === 'pve_greedy') return 'bg-purple-100 text-purple-700';
                if (mode === 'player_room') return 'bg-blue-100 text-blue-700';
                return 'bg-gray-100 text-gray-700';
            },

            get turnLabel() {
                if (!this.currentMatch) return '';
                if (this.currentMatch.status === 'waiting') return 'Đang chờ đối thủ';
                const side = this.currentMatch.current_turn || 'X';
                if (this.myTeam && this.myTeam.side === side) return `Lượt ${side} · Bạn`;
                const team = this.currentMatch.teams && this.currentMatch.teams[side];
                if (team && team.is_bot) return `Lượt ${side} · Greedy Bot`;
                return `Lượt ${side} · Đối thủ`;
            },

            get statusLabel() {
                const status = (this.currentMatch && this.currentMatch.status) || '';
                if (status === 'playing') return this.labels.STATUS_PLAYING;
                if (status === 'waiting') return this.labels.STATUS_WAITING;
                return this.labels.STATUS_FINISHED;
            },

            get turnCountdownDisplay() {
                if (this.turnSecondsLeft === null || this.turnSecondsLeft === undefined) return '';
                const v = Math.max(0, Number(this.turnSecondsLeft) || 0);
                return `${v}s`;
            },

            get finishReasonLabel() {
                const reason = this.currentMatch && this.currentMatch.finish_reason;
                if (reason === 'win') return 'Tạo 5 quân liên tiếp';
                if (reason === 'timeout_forfeit') return 'Hết thời gian';
                if (reason === 'surrender') return 'Đầu hàng';
                if (reason === 'draw') return 'Hòa';
                return reason || 'Kết thúc';
            },

            get resultTitle() {
                if (!this.currentMatch) return '';
                const winner = this.currentMatch.winner;
                if (!winner) return 'Trận đấu hòa';
                const team = this.currentMatch.teams && this.currentMatch.teams[winner];
                return `${winner} · ${team ? team.name : 'Đội thắng'} thắng`;
            },

            get scoreLabel() {
                if (!this.currentMatch || !this.currentMatch.winner) return '1 - 1';
                return this.currentMatch.winner === 'X' ? '1 - 0' : '0 - 1';
            },

            togglePlay() {
                if (!this.isPlaybackEnabled) {
                    return;
                }
                this.isPlaying = !this.isPlaying;
                if (this.isPlaying) {
                    this.startAutoPlay();
                } else {
                    this.stopAutoPlay();
                }
            },

            startAutoPlay() {
                this.stopAutoPlay();
                const speedValue = Math.max(0.25, Number(this.speed) || 1);
                const intervalMs = Math.max(120, Math.round(1000 / speedValue));

                this.playTimerId = setInterval(() => {
                    if (!this.isPlaying || !this.isPlaybackEnabled) {
                        return;
                    }
                    if (this.currentStep >= this.totalSteps) {
                        this.isPlaying = false;
                        this.stopAutoPlay();
                        return;
                    }
                    this.nextMove();
                }, intervalMs);
            },

            stopAutoPlay() {
                if (this.playTimerId) {
                    clearInterval(this.playTimerId);
                    this.playTimerId = null;
                }
            },

            onSpeedChange() {
                if (this.isPlaying) {
                    this.startAutoPlay();
                }
            },

            firstMove() {
                if (!this.isPlaybackEnabled) return;
                this.currentStep = 0;
                this.updateHighlights();
            },

            prevMove() {
                if (!this.isPlaybackEnabled) {
                    return;
                }
                if (this.currentStep > 0) {
                    this.currentStep -= 1;
                }
                this.updateHighlights();
            },

            nextMove() {
                if (!this.isPlaybackEnabled) {
                    return;
                }
                if (this.currentStep < this.totalSteps) {
                    this.currentStep += 1;
                }
                this.updateHighlights();
            },

            lastMove() {
                if (!this.isPlaybackEnabled) return;
                this.currentStep = this.totalSteps;
                this.updateHighlights();
            },

            seek() {
                if (!this.isPlaybackEnabled) {
                    return;
                }
                this.currentStep = Math.max(0, Math.min(Number(this.currentStep) || 0, this.totalSteps));
                this.updateHighlights();
            },

            updateReplayTooltip(event) {
                if (!event || !event.currentTarget) return;
                const rect = event.currentTarget.getBoundingClientRect();
                const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
                const step = Math.round(ratio * this.totalSteps);
                const move = this.fullHistory[Math.max(0, step - 1)];
                this.replayTooltip = move ? `#${move.order} ${move.team} ${move.coord}` : 'Bắt đầu';
                this.replayTooltipStyle = `left:${Math.round(ratio * rect.width)}px; transform: translateX(-50%);`;
            },

            openReplayMatch(matchId) {
                if (!matchId) return;
                const normalized = String(matchId);
                localStorage.setItem('qx_student_view_match', normalized);
                window.location.href = `/student/match?mode=replay&match_id=${encodeURIComponent(normalized)}`;
            },

            syncReplayStep(resetToEnd = false) {
                if (!this.currentMatch) {
                    this.currentStep = 0;
                    this.highlightedLastMove = null;
                    this.winningCells = [];
                    this.isPlaying = false;
                    this.stopAutoPlay();
                    return;
                }

                if (this.isPlaybackEnabled) {
                    if (resetToEnd || this.currentStep > this.totalSteps) {
                        this.currentStep = this.totalSteps;
                    }
                } else {
                    this.currentStep = this.totalSteps;
                    this.isPlaying = false;
                    this.stopAutoPlay();
                }

                this.updateHighlights();
            },

            updateHighlights() {
                const moves = this.visibleHistory;
                this.highlightedLastMove = moves.length ? moves[moves.length - 1] : null;
                this.winningCells = this.detectWinningCells(moves);
                this.renderBoard();
            },

            initBoardRenderer() {
                if (this.boardRenderer || !this.$refs.boardCanvas || !window.QXBoardCanvas) return;
                this.boardRenderer = window.QXBoardCanvas.create(this.$refs.boardCanvas, {
                    interactive: true,
                    cellSize: this.cellSize,
                    onCellClick: (x, y) => this.submitHumanMove(x, y),
                    onHoverCell: (cell) => { this.hoverCell = cell; },
                });
                this.renderBoard();
            },

            renderBoard() {
                if (!this.boardRenderer) this.initBoardRenderer();
                if (!this.boardRenderer) return;
                this.boardRenderer.setState({
                    board: this.currentMatch ? this.currentMatch.board : null,
                    history: this.visibleHistory,
                    currentStep: null,
                    lastMove: this.highlightedLastMove,
                    winningCells: this.winningCells,
                    highlightedCell: this.highlightedCell,
                    currentTurn: this.currentMatch ? this.currentMatch.current_turn : null,
                    mySide: this.myTeam ? this.myTeam.side : null,
                    status: this.currentMatch ? this.currentMatch.status : null,
                });
            },

            applyZoom(size) {
                this.cellSize = this.boardRenderer && this.boardRenderer.setCellSize ? this.boardRenderer.setCellSize(size) : size;
                localStorage.setItem('qx_board_cell_size', String(this.cellSize));
                this.renderBoard();
            },

            zoomIn() {
                this.applyZoom((Number(this.cellSize) || 20) + 2);
            },

            zoomOut() {
                this.applyZoom((Number(this.cellSize) || 20) - 2);
            },

            resetZoom() {
                this.applyZoom(20);
            },

            fitBoard() {
                const container = document.getElementById('board-container');
                if (!container) return;
                const size = Math.floor((Math.min(container.clientWidth, container.clientHeight) - 80) / CONFIG.BOARD_SIZE);
                this.applyZoom(Math.max(12, Math.min(24, size)));
                container.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
            },

            focusMoves() {
                const moves = this.visibleHistory;
                if (!moves.length) return;
                const xs = moves.map((m) => Number(m.x)).filter(Number.isFinite);
                const ys = moves.map((m) => Number(m.y)).filter(Number.isFinite);
                if (!xs.length || !ys.length) return;
                const minX = Math.max(0, Math.min(...xs) - 3);
                const maxX = Math.min(CONFIG.BOARD_SIZE - 1, Math.max(...xs) + 3);
                const minY = Math.max(0, Math.min(...ys) - 3);
                const maxY = Math.min(CONFIG.BOARD_SIZE - 1, Math.max(...ys) + 3);
                const container = document.getElementById('board-container');
                if (!container) return;
                const targetCellSize = Math.floor(Math.min((container.clientWidth - 90) / Math.max(1, maxX - minX + 1), (container.clientHeight - 90) / Math.max(1, maxY - minY + 1)));
                this.applyZoom(Math.max(16, Math.min(36, targetCellSize)));
                this.$nextTick(() => {
                    container.scrollTo({ left: Math.max(0, minX * this.cellSize), top: Math.max(0, minY * this.cellSize), behavior: 'smooth' });
                });
            },

            handleBoardWheel(event) {
                if (!event) return;
                if (event.deltaY < 0) this.zoomIn();
                if (event.deltaY > 0) this.zoomOut();
            },

            clearMoveQueue() {
                if (this.queueTimerId) clearTimeout(this.queueTimerId);
                this.queueTimerId = null;
                this.moveQueue = [];
                this.isQueuePlaying = false;
            },

            highlightMove(move) {
                if (!move) return;
                this.highlightedCell = { x: Number(move.x), y: Number(move.y) };
                this.renderBoard();
            },

            clearHighlightedMove() {
                this.highlightedCell = null;
                this.renderBoard();
            },

            goToMove(order) {
                if (!this.isPlaybackEnabled) return;
                this.currentStep = Math.max(0, Math.min(Number(order) || 0, this.totalSteps));
                this.updateHighlights();
                this.focusMoves();
            },

            eventLabel(eventItem) {
                const type = eventItem && eventItem.type;
                if (type === 'move_accepted') return eventItem.message || 'Nước đi hợp lệ.';
                if (type === 'turn_changed') return eventItem.message || 'Đổi lượt.';
                if (type === 'win_detected') return 'Đã phát hiện chuỗi 5 quân liên tiếp.';
                if (type === 'match_finished') return eventItem.message || 'Trận đấu kết thúc.';
                if (type === 'match_surrendered') return eventItem.message || 'Có đội đầu hàng.';
                if (type === 'timeout_forfeit') return eventItem.message || 'Hết thời gian.';
                return eventItem.message || 'Sự kiện trận đấu.';
            },

            applyIncomingMatch(match, { animate = true } = {}) {
                if (!match) {
                    this.currentMatch = null;
                    this.displayHistoryLimit = 0;
                    this.clearMoveQueue();
                    return;
                }

                const sameMatch = this.currentMatch && this.currentMatch.id === match.id;
                const previousLimit = sameMatch ? Math.max(0, Math.min(this.displayHistoryLimit || 0, this.fullHistory.length)) : 0;
                const nextLength = Array.isArray(match.history) ? match.history.length : 0;
                this.currentMatch = match;

                if (this.replayMode || !animate || !sameMatch) {
                    this.clearMoveQueue();
                    this.displayHistoryLimit = nextLength;
                    this.syncReplayStep(true);
                    return;
                }

                this.displayHistoryLimit = Math.min(previousLimit || nextLength, nextLength);
                if (nextLength > this.displayHistoryLimit) {
                    this.moveQueue = [];
                    for (let i = this.displayHistoryLimit + 1; i <= nextLength; i += 1) this.moveQueue.push(i);
                    this.drainMoveQueue();
                } else {
                    this.syncReplayStep(false);
                }
            },

            drainMoveQueue() {
                if (this.isQueuePlaying || !this.moveQueue.length) {
                    this.maybeShowFinishPopup();
                    return;
                }
                this.isQueuePlaying = true;
                const step = () => {
                    const nextLimit = this.moveQueue.shift();
                    if (nextLimit) {
                        this.displayHistoryLimit = nextLimit;
                        this.updateHighlights();
                    }
                    if (this.moveQueue.length) {
                        this.queueTimerId = setTimeout(step, this.liveMoveDelayMs);
                    } else {
                        this.queueTimerId = null;
                        this.isQueuePlaying = false;
                        this.maybeShowFinishPopup();
                    }
                };
                step();
            },

            maybeShowFinishPopup() {
                if (!this.currentMatch || this.currentMatch.status !== 'finished' || this.showingWinnerPopup || this.isQueuePlaying || this.moveQueue.length) return;
                if (this.finishPopupTimerId) clearTimeout(this.finishPopupTimerId);
                this.finishPopupTimerId = setTimeout(() => { this.showingWinnerPopup = true; this.finishPopupTimerId = null; }, 600);
            },

            async submitHumanMove(x, y) {
                if (this.movePending || this.replayMode || !this.currentMatch || !this.myTeam) return;
                if (this.currentMatch.status !== 'playing' || this.currentMatch.current_turn !== this.myTeam.side) return;
                this.movePending = true;
                try {
                    const result = await window.QXApi.matches.submitMove(this.currentMatch.id, { x, y });
                    const nextMatch = (result.data || {}).match || this.currentMatch;
                    this.applyIncomingMatch(nextMatch, { animate: true });
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.updateCountdown();
                    this.handleStatusTransitions();
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể gửi nước đi.', 'error');
                    }
                } finally {
                    this.movePending = false;
                }
            },

            detectWinningCells(moves) {
                if (!this.currentMatch || this.currentMatch.status !== 'finished' || this.currentMatch.finish_reason !== 'win') {
                    return [];
                }
                if (moves.length === this.fullHistory.length && Array.isArray(this.currentMatch.winning_cells) && this.currentMatch.winning_cells.length) {
                    return this.currentMatch.winning_cells;
                }
                if (!moves.length) {
                    return [];
                }

                const last = moves[moves.length - 1];
                if (!last || !last.team || this.currentMatch.winner !== last.team) {
                    return [];
                }

                const size = Number(CONFIG.BOARD_SIZE) || 40;
                const board = Array.from({ length: size }, () => Array(size).fill(0));
                for (const move of moves) {
                    const x = Number(move.x);
                    const y = Number(move.y);
                    if (!Number.isInteger(x) || !Number.isInteger(y) || x < 0 || y < 0 || x >= size || y >= size) {
                        continue;
                    }
                    board[x][y] = move.team === 'X' ? 1 : 2;
                }

                const value = last.team === 'X' ? 1 : 2;
                const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
                const lx = Number(last.x);
                const ly = Number(last.y);

                if (!Number.isInteger(lx) || !Number.isInteger(ly)) {
                    return [];
                }

                for (const [dx, dy] of directions) {
                    const cells = [{ x: lx, y: ly }];

                    let step = 1;
                    while (true) {
                        const nx = lx + dx * step;
                        const ny = ly + dy * step;
                        if (nx < 0 || ny < 0 || nx >= size || ny >= size) break;
                        if (board[nx][ny] !== value) break;
                        cells.push({ x: nx, y: ny });
                        step += 1;
                    }

                    step = 1;
                    while (true) {
                        const nx = lx - dx * step;
                        const ny = ly - dy * step;
                        if (nx < 0 || ny < 0 || nx >= size || ny >= size) break;
                        if (board[nx][ny] !== value) break;
                        cells.unshift({ x: nx, y: ny });
                        step += 1;
                    }

                    if (cells.length >= 5) {
                        return cells;
                    }
                }

                return [];
            },

            async init() {
                this.$nextTick(() => this.initBoardRenderer());
                const params = new URLSearchParams(window.location.search);
                const queryMatchId = (params.get('match_id') || '').trim();
                const rawView = queryMatchId || localStorage.getItem('qx_student_view_match');
                if (rawView) {
                    this.replayMode = true;
                    this.replayMatchId = rawView;
                    localStorage.removeItem('qx_student_view_match');

                    await this.loadMatchById(rawView);
                    this.startCountdown();
                    if (!this.currentMatch) {
                        if (window.QXToast && window.QXToast.show) {
                            window.QXToast.show('Không thể tải replay của trận này.', 'error');
                        }
                    }
                    return;
                }

                await this.loadMyMatchFull();
                this.startPolling();
                this.startCountdown();
            },

            async loadMatchById(matchId) {
                this.loading = true;
                try {
                    const result = await window.QXApi.matches.getMatch(matchId);
                    const data = result.data || {};
                    this.applyIncomingMatch(data.match || null, { animate: false });
                    this.myTeam = null;
                    this.otherMatches = {
                        current_matches: [],
                        upcoming_matches: [],
                        finished_matches: [],
                    };
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.updateCountdown();
                    this.handleStatusTransitions();
                    this.syncReplayStep(true);
                } catch (error) {
                    this.currentMatch = null;
                    this.myTeam = null;
                    this.syncReplayStep(true);
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể tải trận đấu.', 'error');
                    }
                } finally {
                    this.loading = false;
                }
            },

            startPolling() {
                this.pollStopped = false;
                if (this.pollTimerId) {
                    clearTimeout(this.pollTimerId);
                }

                if (!this.pollVisibilityListenerAdded) {
                    this.pollVisibilityListenerAdded = true;
                    document.addEventListener('visibilitychange', () => {
                        if (!document.hidden) {
                            this.loadMyMatchSummary();
                        }
                    }, { passive: true });
                }

                const delayMs = Math.max(200, Number(CONFIG.MATCH_STEP_DELAY_MS) || 750);
                const loop = async () => {
                    if (this.pollStopped) return;

                    if (document.hidden) {
                        this.pollTimerId = setTimeout(loop, Math.min(5000, delayMs));
                        return;
                    }

                    if (this.pollInFlight) {
                        this.pollTimerId = setTimeout(loop, delayMs);
                        return;
                    }

                    this.pollInFlight = true;
                    try {
                        await this.loadMyMatchSummary();
                    } finally {
                        this.pollInFlight = false;
                    }

                    this.pollTimerId = setTimeout(loop, delayMs);
                };

                loop();
            },

            stopPolling() {
                this.pollStopped = true;
                if (this.pollTimerId) {
                    clearTimeout(this.pollTimerId);
                    this.pollTimerId = null;
                }
            },

            startCountdown() {
                if (this.countdownTimerId) {
                    clearInterval(this.countdownTimerId);
                }

                this.countdownTimerId = setInterval(() => {
                    this.updateCountdown();
                }, 200);
            },

            updateCountdown() {
                const match = this.currentMatch;
                if (!match || match.status !== 'playing') {
                    this.turnSecondsLeft = null;
                    return;
                }

                const iso = match.turn_deadline_at;
                if (!iso) {
                    this.turnSecondsLeft = null;
                    return;
                }

                const deadline = new Date(iso);
                if (Number.isNaN(deadline.getTime())) {
                    this.turnSecondsLeft = null;
                    return;
                }

                const diffMs = deadline.getTime() - Date.now();
                const left = Math.max(0, Math.ceil(diffMs / 1000));
                this.turnSecondsLeft = left;
            },

            copyApiBody() {
                const text = this.apiBody;
                window.QXCopy(text, 'Đã sao chép API Body');
            },

            mergeSummaryIntoCurrentMatch(summary) {
                if (!summary) return;
                if (!this.currentMatch || this.currentMatch.id !== summary.id) {
                    this.currentMatch = summary;
                    this.lastRev = Number(summary.rev);
                    return;
                }

                const prev = this.currentMatch;
                const mergedTeams = {
                    X: {
                        ...(prev.teams?.X || {}),
                        ...(summary.teams?.X || {}),
                    },
                    O: {
                        ...(prev.teams?.O || {}),
                        ...(summary.teams?.O || {}),
                    },
                };

                this.currentMatch = {
                    ...prev,
                    ...summary,
                    teams: mergedTeams,
                    history: prev.history || [],
                    events: prev.events || [],
                };
                this.lastRev = Number(summary.rev);
                this.syncReplayStep(false);
            },

            handleStatusTransitions() {
                if (this.currentMatch) {
                    if (this.lastStatus && this.lastStatus !== 'finished' && this.currentMatch.status === 'finished') {
                        this.maybeShowFinishPopup();
                    }
                    this.lastStatus = this.currentMatch.status;
                } else {
                    this.lastStatus = null;
                    if (this.finishPopupTimerId) { clearTimeout(this.finishPopupTimerId); this.finishPopupTimerId = null; }
                    this.showingWinnerPopup = false;
                }
            },

            async loadMyMatchFull(showLoading = true) {
                if (showLoading) {
                    this.loading = true;
                }
                try {
                    const result = await window.QXApi.matches.getMyMatch();
                    const data = result.data || {};
                    this.applyIncomingMatch(data.my_current_match || null, { animate: !showLoading });
                    this.myTeam = data.my_team || null;
                    this.otherMatches = data.other_matches || {
                        current_matches: [],
                        upcoming_matches: [],
                        finished_matches: [],
                    };
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    if (!this.currentMatch) await this.loadRecentMatches();
                    this.updateCountdown();
                    this.handleStatusTransitions();
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể tải dữ liệu trận đấu.', 'error');
                    }
                } finally {
                    if (showLoading) {
                        this.loading = false;
                    }
                }
            },

            async loadMyMatchSummary() {
                try {
                    if (this.replayMode) {
                        return;
                    }
                    const sinceRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    const result = await window.QXApi.matches.getMyMatchSummary(sinceRev);
                    const data = result.data || {};

                    const summaryMatch = data.my_current_match || null;
                    const revChanged = !!data.rev_changed;

                    // No active summary can mean the match just finished and left the active query.
                    if (!summaryMatch) {
                        if (this.currentMatch && this.currentMatch.id) {
                            try {
                                const full = await window.QXApi.matches.getMatch(this.currentMatch.id);
                                const finishedMatch = (full.data || {}).match || null;
                                if (finishedMatch) {
                                    this.applyIncomingMatch(finishedMatch, { animate: true });
                                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                                    this.updateCountdown();
                                    this.handleStatusTransitions();
                                    if (this.loading) this.loading = false;
                                    return;
                                }
                            } catch (error) {
                                // Fall through to empty state only if the match cannot be loaded.
                            }
                        }
                        this.applyIncomingMatch(null, { animate: false });
                        this.myTeam = data.my_team || null;
                        this.otherMatches = data.other_matches || {
                            current_matches: [],
                            upcoming_matches: [],
                            finished_matches: [],
                        };
                        await this.loadRecentMatches();
                        this.updateCountdown();
                        this.handleStatusTransitions();
                        if (this.loading) this.loading = false;
                        return;
                    }

                    // If match id changed (new match created), refresh full.
                    if (!this.currentMatch || this.currentMatch.id !== summaryMatch.id) {
                        if (!this.currentMatch) {
                            await this.loadMyMatchFull(false);
                        }
                        if (this.loading) this.loading = false;
                        return;
                    }

                    // Merge light fields (status/turn/deadline/connectivity) every poll.
                    this.mergeSummaryIntoCurrentMatch(summaryMatch);
                    this.myTeam = data.my_team || this.myTeam;
                    this.updateCountdown();

                    // Load full payload before status transition handling so final move/history render first.
                    if (revChanged) {
                        await this.loadMyMatchFull(false);
                        if (this.loading) this.loading = false;
                        return;
                    }

                    this.handleStatusTransitions();
                    if (this.loading) this.loading = false;
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể tải dữ liệu trận đấu.', 'error');
                    }
                } finally {
                    if (this.loading) {
                        this.loading = false;
                    }
                }
            },

            async joinPlayerRoom(matchId) {
                try {
                    const result = await window.QXApi.matches.joinPlayerRoom(matchId);
                    const data = result.data || {};
                    this.applyIncomingMatch(data.match || null, { animate: false });
                    this.myTeam = data.my_team || this.myTeam;
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.$nextTick(() => this.renderBoard());
                    if (window.QXToast && window.QXToast.show) window.QXToast.show('Đã tham gia phòng.', 'success');
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) window.QXToast.show(error.message || 'Không thể tham gia phòng.', 'error');
                }
            },

            async createPlayerRoom() {
                if (this.isCreatingPlayerRoom || !this.canCreateBotMatch) return;
                this.isCreatingPlayerRoom = true;
                try {
                    const result = await window.QXApi.matches.createPlayerRoom({
                        room_name: (this.createRoomName || '').trim() || null,
                        visibility: this.createRoomVisibility || 'public',
                    });
                    const data = result.data || {};
                    this.applyIncomingMatch(data.match || null, { animate: false });
                    this.myTeam = data.my_team || this.myTeam;
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.createRoomName = '';
                    this.$nextTick(() => this.renderBoard());
                    if (window.QXToast && window.QXToast.show) window.QXToast.show('Đã tạo phòng chơi.', 'success');
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) window.QXToast.show(error.message || 'Không thể tạo phòng.', 'error');
                } finally {
                    this.isCreatingPlayerRoom = false;
                }
            },

            async loadRecentMatches() {
                try {
                    const result = await window.QXApi.matches.getMyHistory(10);
                    this.recentMatches = ((result.data || {}).matches || []);
                } catch (error) {
                    this.recentMatches = [];
                }
            },

            async confirmSurrender() {
                if (!this.currentMatch || this.surrenderPending) return;
                this.surrenderPending = true;
                try {
                    const result = await window.QXApi.matches.surrenderMatch(this.currentMatch.id);
                    const nextMatch = (result.data || {}).match || this.currentMatch;
                    this.showSurrenderConfirm = false;
                    this.applyIncomingMatch(nextMatch, { animate: true });
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.updateCountdown();
                    this.handleStatusTransitions();
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể đầu hàng.', 'error');
                    }
                } finally {
                    this.surrenderPending = false;
                }
            },

            async createGreedyBotMatch() {
                if (this.isCreatingBotMatch || !this.canCreateBotMatch) {
                    return;
                }

                this.isCreatingBotMatch = true;
                try {
                    const payload = {
                        room_name: (this.createBotRoomName || '').trim() || null,
                    };

                    const result = await window.QXApi.matches.createGreedyBotMatch(payload);
                    const data = result.data || {};
                    this.applyIncomingMatch(data.match || null, { animate: false });
                    this.myTeam = data.my_team || this.myTeam;
                    this.lastRev = this.currentMatch ? Number(this.currentMatch.rev) : null;
                    this.createBotRoomName = '';
                    this.updateCountdown();
                    this.$nextTick(() => this.renderBoard());

                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show('Đã tạo trận với Greedy Bot.', 'success');
                    }
                } catch (error) {
                    if (window.QXToast && window.QXToast.show) {
                        window.QXToast.show(error.message || 'Không thể tạo trận với bot.', 'error');
                    }
                } finally {
                    this.isCreatingBotMatch = false;
                }
            },
        };
    }
</script>
