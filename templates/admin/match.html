{% extends "admin/base_admin.html" %}

{% block admin_content %}
<div class="flex h-[calc(100vh-8rem)] flex-col lg:flex-row gap-6" x-data="adminMatch()" x-init="init()">

    <!-- Left: Game Board Area -->
    <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden relative">
        <!-- Top Status Bar -->
        <div class="h-14 bg-white border-b border-gray-100 flex items-center justify-between px-6 shrink-0 z-10">
            <!-- Left: Live Status -->
            <div class="flex items-center space-x-4">
                 <!-- Back Button -->
                 <a href="/admin/rooms" class="inline-flex items-center text-sm font-semibold text-gray-500 hover:text-[#3547E5] transition-colors border-r border-gray-200 pr-4 mr-2">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Quay lại
                 </a>

                 <!-- Status Indicator -->
                 <div class="flex items-center space-x-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse" :class="{'bg-green-500': isPlaying, 'bg-yellow-500': !isPlaying}"></span>
                    <span class="text-sm font-bold text-gray-900" x-text="isPlaying ? 'Đang diễn ra' : 'Tạm dừng'"></span>
                </div>
                <!-- Time -->
                <div class="text-sm font-mono font-medium text-gray-500 border-l pl-4 border-gray-200">
                    Thời gian: <span class="text-gray-900 font-bold" x-text="timeDisplay"></span>
                </div>
            </div>
        </div>

        <!-- Board Container -->
        <div class="flex-1 overflow-auto bg-[#F0F2F5] p-4 flex items-center justify-center cursor-move" id="board-container">
            <!-- 40x40 Grid Canvas/Container -->
             <div class="relative bg-white shadow-lg border border-gray-300 mx-auto"
                  :style="`width: ${40 * 20}px; height: ${40 * 20}px; background-size: 20px 20px; background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px), linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);`">

                <!-- Pieces (Example Rendering) -->
                <template x-for="move in history.slice(0, currentStep)" :key="move.order">
                    <div class="absolute flex items-center justify-center w-5 h-5"
                         :style="`left: ${move.x * 20}px; top: ${move.y * 20}px;`">
                        <span class="font-bold text-[10px]"
                              :class="move.team === 'X' ? 'text-[#3547E5]' : 'text-[#E53535]'"
                              x-text="move.team"></span>
                    </div>
                </template>

                <!-- Last Move Highlight -->
                <div x-show="lastMove" class="absolute w-5 h-5 border-2 border-yellow-400 pointer-events-none"
                     :style="`left: ${lastMove ? lastMove.x * 20 : 0}px; top: ${lastMove ? lastMove.y * 20 : 0}px;`"></div>
            </div>
        </div>

        <!-- Bottom Playback Toolbar -->
        <div class="h-16 bg-white border-t border-gray-100 flex items-center px-4 space-x-2 shrink-0 z-10 select-none">

             <!-- Play/Pause -->
             <button @click="togglePlay" class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-700 transition-colors focus:outline-none">
                <template x-if="isPlaying">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </template>
                <template x-if="!isPlaying">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </template>
             </button>

             <!-- Seeking Controls -->
             <button @click="prevMove" class="w-8 h-8 rounded hover:bg-gray-100 flex items-center justify-center text-gray-500 transition-colors">
                 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
             </button>

             <!-- Slider -->
             <div class="flex-1 mx-2 flex items-center">
                 <span class="text-xs font-mono text-gray-500 mr-2 w-8 text-right" x-text="currentStep"></span>
                 <input type="range" min="0" :max="totalSteps" x-model="currentStep" @input="seek"
                        class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[#3547E5]">
                 <span class="text-xs font-mono text-gray-500 ml-2 w-8" x-text="totalSteps"></span>
             </div>

             <button @click="nextMove" class="w-8 h-8 rounded hover:bg-gray-100 flex items-center justify-center text-gray-500 transition-colors">
                 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
             </button>

             <!-- Speed Divider -->
             <div class="h-6 w-px bg-gray-200 mx-2"></div>

             <!-- Speed Select -->
             <div class="relative">
                 <select x-model="speed" class="appearance-none bg-gray-50 border border-gray-200 text-gray-700 text-xs font-bold py-1.5 pl-3 pr-8 rounded outline-none focus:border-[#3547E5] cursor-pointer">
                    <option value="0.5">0.5x</option>
                    <option value="1">1x</option>
                    <option value="2">2x</option>
                    <option value="4">4x</option>
                 </select>
                 <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                    <svg class="fill-current h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                  </div>
             </div>
        </div>
    </div>

    <!-- Right: Info Panel -->
    <div class="w-full lg:w-80 flex flex-col gap-6 shrink-0 h-full overflow-hidden">

        <!-- Teams Card -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 shrink-0">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Các đội</h3>

            <div class="space-y-3">
                <div class="flex items-center justify-between p-2 rounded bg-blue-50 border border-blue-100">
                    <div class="flex items-center">
                        <span class="w-6 h-6 rounded flex items-center justify-center bg-[#3547E5] text-white text-xs font-bold mr-2">X</span>
                        <span class="font-bold text-gray-900 text-sm" x-text="match?.teams?.X?.name || ''"></span>
                    </div>
                </div>

                <div class="flex items-center justify-between p-2 rounded bg-white hover:bg-gray-50 border border-gray-100">
                    <div class="flex items-center">
                        <span class="w-6 h-6 rounded flex items-center justify-center bg-[#E53535] text-white text-xs font-bold mr-2">O</span>
                        <span class="font-bold text-gray-900 text-sm" x-text="match?.teams?.O?.name || ''"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Move History -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden">
            <div class="p-4 border-b border-gray-100 bg-gray-50/50">
                <h3 class="text-xs font-bold text-gray-900 uppercase">Lịch sử nước đi</h3>
            </div>
            <div class="flex-1 overflow-y-auto p-0">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                        <tr>
                            <th class="px-3 py-2 text-xs font-semibold text-gray-500">#</th>
                            <th class="px-3 py-2 text-xs font-semibold text-gray-500">Đội</th>
                            <th class="px-3 py-2 text-xs font-semibold text-gray-500 text-right">Tọa độ</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <template x-for="(move, index) in history.slice(0, currentStep)" :key="move.order || index">
                            <tr class="text-xs" :class="{'bg-blue-50/50': index === currentStep - 1}">
                                <td class="px-3 py-2 text-gray-500 font-mono" x-text="move.order || index + 1"></td>
                                <td class="px-3 py-2 font-bold"
                                    :class="move.team === 'X' ? 'text-[#3547E5]' : 'text-[#E53535]'"
                                    x-text="move.team"></td>
                                <td class="px-3 py-2 text-gray-700 font-mono text-right" x-text="`(${move.x}, ${move.y})`"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>



        <!-- API Body Inspector -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 h-1/3 flex flex-col overflow-hidden shrink-0">
            <div class="p-3 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                <h3 class="text-xs font-bold text-gray-900 uppercase">API Body</h3>
                <span class="text-[10px] font-mono bg-gray-200 px-1.5 rounded text-gray-600">JSON</span>
            </div>
            <div class="flex-1 bg-[#282c34] p-3 overflow-auto group relative">
                 <!-- Copy Button -->
                <button class="absolute top-2 right-2 text-gray-400 hover:text-white opacity-0 group-hover:opacity-100 transition-opacity">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                </button>
                <div class="text-xs font-mono text-gray-300 leading-relaxed whitespace-pre" x-text="apiBody"></div>
            </div>
        </div>

    </div>
</div>

<script>
    function adminMatch() {
        return {
            isPlaying: false,
            timeDisplay: '00:00',
            currentStep: 0,
            totalSteps: 0,
            speed: '1',
            history: [],
            match: null,

            get lastMove() {
                if (this.currentStep === 0) return null;
                return this.history[this.currentStep - 1] || null;
            },

            get apiBody() {
                const move = this.lastMove;
                if (!move) return '{}';
                return JSON.stringify({
                    team_id: move.team === 'X' ? 101 : 102,
                    move: {
                        x: move.x,
                        y: move.y
                    },
                    timestamp: new Date().toISOString()
                }, null, 2);
            },

            togglePlay() {
                this.isPlaying = !this.isPlaying;
            },

            prevMove() {
                if (this.currentStep > 0) this.currentStep--;
            },

            nextMove() {
                if (this.currentStep < this.totalSteps) this.currentStep++;
            },

            seek() {
                // Logic to update board state based on currentStep
            },

            init() {
                console.log('[AdminMatch] Initialized');
                this.loadLatestMatch();
            },

            setActiveMatch(match) {
                if (!match) return;
                this.match = match;
                this.history = match.history || [];
                this.totalSteps = (match.history || []).length;
                this.currentStep = this.totalSteps;
            },

            async loadLatestMatch() {
                try {
                    const json = await window.QXApi.request('/api/v1/matches/overview', {
                        method: 'GET',
                    });

                    const data = json.data || {};
                    const viewId = localStorage.getItem('qx_view_match');
                    localStorage.removeItem('qx_view_match');

                    let pick = null;
                    if (viewId) {
                        const allMatches = [
                            ...(data.current_matches || []),
                            ...(data.upcoming_matches || []),
                            ...(data.finished_matches || [])
                        ];
                        pick = allMatches.find(m => m.id === viewId);
                    }

                    if (!pick) {
                        pick = (data.current_matches && data.current_matches[0])
                            || (data.upcoming_matches && data.upcoming_matches[0])
                            || (data.finished_matches && data.finished_matches[0])
                            || null;
                    }

                    this.setActiveMatch(pick);
                } catch (error) {
                    console.error('Failed to load latest match:', error);
                }
            },
        }
    }
</script>
{% endblock %}
